from gvtest.testsuite import *

import re


def _cycles(output: str, who: str, event: str) -> list:
    """Return the cycle numbers where ``[cycle] who event`` appears."""
    rx = re.compile(rf'^\[(\d+)\] {re.escape(who)} {re.escape(event)}\b')
    out = []
    for line in output.splitlines():
        m = rx.match(line)
        if m:
            out.append(int(m.group(1)))
    return out


def _count(output: str, who: str, event: str) -> int:
    return len(_cycles(output, who, event))


def _check_hit_basic(test, output, *args, **kwargs):
    # Two CPU reads, one miss followed by one hit on the same line. Both
    # complete synchronously (cache returns DONE inline) so the master
    # logs DONE rather than RESP.
    # Expectations:
    #   - exactly one REQ arrives at the refill target
    #   - two DONEs on the master
    if _count(output, 'mem', 'REQ') != 1:
        return False, f'Expected 1 refill REQ to mem, got {_count(output, "mem", "REQ")}'
    if _count(output, 'master', 'DONE') != 2:
        return False, f'Expected 2 master DONEs, got {_count(output, "master", "DONE")}'
    return True, 'miss then hit: one refill, two DONEs'


def _check_miss_sync(test, output, *args, **kwargs):
    # Two misses (different lines), target returns DONE inline, refill_latency=5.
    # Expect two REQs to mem and two DONEs on the master side with latency >= 5.
    if _count(output, 'mem', 'REQ') != 2:
        return False, f'Expected 2 refill REQs, got {_count(output, "mem", "REQ")}'
    done_lines = [l for l in output.splitlines() if ' master DONE ' in l]
    if len(done_lines) != 2:
        return False, f'Expected 2 master DONE lines, got {len(done_lines)}'
    for l in done_lines:
        m = re.search(r'latency=(\d+)', l)
        if not m or int(m.group(1)) < 5:
            return False, f'DONE missing or latency<5: {l}'
    return True, 'two sync misses with stacked latency >= 5'


def _check_miss_async(test, output, *args, **kwargs):
    # One miss, async refill with 20-cycle delay. Master must see GRANTED first,
    # then RESP at cycle >= issue(10) + 20 = 30.
    if _count(output, 'master', 'GRANTED') != 1:
        return False, f'Expected 1 GRANTED on master, got {_count(output, "master", "GRANTED")}'
    resps = _cycles(output, 'master', 'RESP')
    if len(resps) != 1:
        return False, f'Expected 1 RESP on master, got {len(resps)}'
    if resps[0] < 30:
        return False, f'Expected RESP at cycle >= 30, got {resps[0]}'
    return True, f'GRANTED then RESP at cycle {resps[0]}'


def _check_queue_during_refill(test, output, *args, **kwargs):
    # Both requests must be GRANTED (A on miss-refill, B queued behind A), and both
    # get a RESP. B's RESP must be strictly after A's (serialised via queue).
    granted = _cycles(output, 'master', 'GRANTED')
    resps   = _cycles(output, 'master', 'RESP')
    if len(granted) != 2:
        return False, f'Expected 2 GRANTEDs on master, got {len(granted)}'
    if len(resps) != 2:
        return False, f'Expected 2 RESPs on master, got {len(resps)}'
    if resps[1] < resps[0]:
        return False, f'RESPs out of order: {resps}'
    return True, f'queue preserved, RESPs at {resps}'


def _check_bypass_done(test, output, *args, **kwargs):
    # Cache disabled: exactly one REQ to mem at an offset-transformed addr, and one
    # DONE inline on the master. With refill_offset=0x1000 and refill_shift=0,
    # mem should see addr 0x20 + 0x1000 = 0x1020.
    reqs = [l for l in output.splitlines() if ' mem REQ ' in l]
    if len(reqs) != 1:
        return False, f'Expected 1 bypass REQ at mem, got {len(reqs)}'
    if 'addr=0x1020' not in reqs[0]:
        return False, f'Bypass REQ addr mismatch: {reqs[0]}'
    if _count(output, 'master', 'DONE') != 1:
        return False, f'Expected 1 DONE on master, got {_count(output, "master", "DONE")}'
    return True, 'bypass forwarded with addr transform, DONE inline'


def _check_bypass_async(test, output, *args, **kwargs):
    # Cache disabled, target GRANTED + resp after 15 cycles. Master sees GRANTED
    # then RESP at cycle >= 25.
    if _count(output, 'master', 'GRANTED') != 1:
        return False, 'Expected 1 GRANTED on master (bypass async)'
    resps = _cycles(output, 'master', 'RESP')
    if len(resps) != 1 or resps[0] < 25:
        return False, f'Expected RESP at cycle >= 25, got {resps}'
    return True, f'bypass async RESP at {resps[0]}'


def _check_refill_denied(test, output, *args, **kwargs):
    # Target denies the refill. Cache must propagate DENIED upstream and later
    # emit a RETRY once the refill port retries us.
    if _count(output, 'master', 'DENIED') < 1:
        return False, 'Expected at least one DENIED on master'
    if _count(output, 'master', 'RETRY') < 1:
        return False, 'Expected at least one RETRY on master'
    return True, 'denied then retry propagated'


def _check_flush_full(test, output, *args, **kwargs):
    # Two prime REQs (lines A,B), then one FLUSH_ACK pulse, then two more REQs
    # (post-flush misses).
    if _count(output, 'mem', 'REQ') != 4:
        return False, f'Expected 4 mem REQs (2 prime + 2 post-flush), got {_count(output, "mem", "REQ")}'
    if _count(output, 'wires', 'FLUSH_ACK') < 1:
        return False, 'Expected a FLUSH_ACK pulse on wires'
    return True, '4 refills around a flush pulse'


def _check_flush_line(test, output, *args, **kwargs):
    # Prime two lines, flush only line A, re-read both. Expect 3 total REQs to mem
    # (prime_a, prime_b, post_a) — post_b must hit.
    if _count(output, 'mem', 'REQ') != 3:
        return False, f'Expected 3 mem REQs (only line A re-refilled), got {_count(output, "mem", "REQ")}'
    return True, 'single-line flush: 3 refills total'


def _check_addr_transform(test, output, *args, **kwargs):
    # refill_shift=1, refill_offset=0x8000. CPU accesses 0x40 -> line_base=0x40 ->
    # refill addr = (0x40 << 1) + 0x8000 = 0x8080.
    reqs = [l for l in output.splitlines() if ' mem REQ ' in l]
    if len(reqs) != 1:
        return False, f'Expected 1 mem REQ, got {len(reqs)}'
    if 'addr=0x8080' not in reqs[0]:
        return False, f'Refill addr transform mismatch: {reqs[0]}'
    return True, 'refill_shift and refill_offset applied correctly'


def testset_build(testset):
    testset.set_name('cache_v4')
    testset.set_components(["cache.cache_v4"])

    t = testset.new_make_test('hit_basic', flags='CASE=hit_basic',
                              checker=_check_hit_basic)
    t.add_description(
        "Prime a line, re-read the same line. First access is a miss and "
        "triggers a synchronous refill; second is a hit. Verifies that only "
        "one REQ reaches the refill target and both master accesses complete "
        "with DONE."
    )

    t = testset.new_make_test('miss_sync', flags='CASE=miss_sync',
                              checker=_check_miss_sync)
    t.add_description(
        "Two misses on different lines, refill target replies DONE inline. "
        "The cache's refill_latency=5 must be accumulated on req->latency. "
        "Validates the synchronous-refill path of Cache::refill "
        "(inc_latency + line->timestamp book-keeping)."
    )

    t = testset.new_make_test('miss_async', flags='CASE=miss_async',
                              checker=_check_miss_async)
    t.add_description(
        "Miss against an async refill target (GRANTED + resp after 20 cycles). "
        "Cache must ack the master as GRANTED, park the CPU req in "
        "refill_pending_reqs, and reply via input_itf.resp() from the "
        "refill_resp path."
    )

    t = testset.new_make_test('queue_during_refill', flags='CASE=queue_during_refill',
                              checker=_check_queue_during_refill)
    t.add_description(
        "Two back-to-back misses on different lines against an async refill "
        "target. The second miss arrives while the first is still refilling; "
        "it must be queued (acked as GRANTED) and resumed by fsm_handler "
        "once the first completes. Validates queueing and ordered drain."
    )

    t = testset.new_make_test('bypass_done', flags='CASE=bypass_done',
                              checker=_check_bypass_done)
    t.add_description(
        "Cache disabled at reset. A CPU read is bypassed verbatim through "
        "the refill port, with the address transformed by "
        "refill_offset=0x1000. Validates the !enabled branch of input_req "
        "and that refill_resp recognises a non-&refill_req and bounces the "
        "reply to input_itf.resp."
    )

    t = testset.new_make_test('bypass_async', flags='CASE=bypass_async',
                              checker=_check_bypass_async)
    t.add_description(
        "Cache disabled, target replies GRANTED + deferred resp after 15 "
        "cycles. Same bypass recognition path as bypass_done, but exercising "
        "the async reply round-trip."
    )

    t = testset.new_make_test('refill_denied', flags='CASE=refill_denied',
                              checker=_check_refill_denied)
    t.add_description(
        "Refill target returns DENIED. Cache propagates DENIED upstream and "
        "owes a retry(). Once the target retries, the cache must call "
        "input_itf.retry() so the master can re-issue. Validates the "
        "deny/retry handshake on the refill-miss path."
    )

    t = testset.new_make_test('flush_full', flags='CASE=flush_full',
                              checker=_check_flush_full)
    t.add_description(
        "Populate two lines, pulse `flush`, then read both again. Validates "
        "Cache::flush() (all tags cleared, flush_ack pulse emitted) and "
        "that post-flush accesses miss and re-refill."
    )

    t = testset.new_make_test('flush_line', flags='CASE=flush_line',
                              checker=_check_flush_line)
    t.add_description(
        "Populate two lines, flush only one of them via flush_line_addr + "
        "flush_line, then read both. Validates Cache::flush_line_op: only "
        "the targeted line re-refills, the other still hits."
    )

    t = testset.new_make_test('addr_transform', flags='CASE=addr_transform',
                              checker=_check_addr_transform)
    t.add_description(
        "refill_shift=1 and refill_offset=0x8000. A CPU access at 0x40 "
        "must reach the refill target at (0x40 << 1) + 0x8000 = 0x8080. "
        "Validates the address transformation applied in Cache::refill() "
        "before refill_itf.req."
    )
