from gvtest.testsuite import *

import re


def _cycles(output: str, who: str, event: str) -> list:
    """Return the cycle numbers where ``[cycle] who event`` appears."""
    rx = re.compile(rf'^\[(\d+)\] {re.escape(who)} {re.escape(event)}\b')
    out = []
    for line in output.splitlines():
        m = rx.match(line)
        if m:
            out.append(int(m.group(1)))
    return out


def _count(output: str, who: str, event: str) -> int:
    return len(_cycles(output, who, event))


def _lines(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[\d+\] {re.escape(who)} {re.escape(event)}\b.*$')
    return [l for l in output.splitlines() if rx.match(l)]


def _check_route_basic(test, output, *args, **kwargs):
    # Four requests (addr = 0x00..0x03), four outputs, exactly one REQ per
    # target at the expected address.
    for i in range(4):
        reqs = _lines(output, f'mem{i}', 'REQ')
        if len(reqs) != 1:
            return False, f'Expected 1 REQ at mem{i}, got {len(reqs)}: {reqs}'
        if f'addr=0x{i:x}' not in reqs[0]:
            return False, f'mem{i} saw wrong address: {reqs[0]}'
    if _count(output, 'master', 'DONE') + _count(output, 'master', 'RESP') != 4:
        return False, 'Expected 4 total master completions (DONE/RESP)'
    return True, '4 reqs routed to 4 distinct outputs'


def _check_route_bits(test, output, *args, **kwargs):
    # Offset=12, width=2. addr=0x0000 → out0, 0x1000 → out1, 0x2000 → out2,
    # 0x3000 → out3.
    for i in range(4):
        reqs = _lines(output, f'mem{i}', 'REQ')
        if len(reqs) != 1:
            return False, f'Expected 1 REQ at mem{i}, got {len(reqs)}: {reqs}'
        want = f'addr=0x{(i << 12):x}'
        if want not in reqs[0]:
            return False, f'mem{i} expected {want}: {reqs[0]}'
    return True, 'bit-field selector routing works'


def _check_route_write(test, output, *args, **kwargs):
    # Writes preserve is_write=1 and route correctly.
    for i in range(2):
        reqs = _lines(output, f'mem{i}', 'REQ')
        if len(reqs) != 1:
            return False, f'Expected 1 REQ at mem{i}, got {len(reqs)}'
        if 'write=1' not in reqs[0]:
            return False, f'mem{i} expected write=1: {reqs[0]}'
    return True, 'write opcode forwarded through selected output'


def _check_single_output(test, output, *args, **kwargs):
    # Width=0: every request, any address, goes to output_0.
    reqs = _lines(output, 'mem0', 'REQ')
    if len(reqs) != 3:
        return False, f'Expected 3 REQs at mem0, got {len(reqs)}'
    return True, 'width=0 routes everything to output_0'


def testset_build(testset):
    testset.set_name('demux_v2')
    testset.set_components(["interco.demux_v2"])

    t = testset.new_make_test('route_basic', flags='CASE=route_basic',
                              checker=_check_route_basic,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Four outputs (offset=0, width=2). Four CPU requests with "
        "addresses 0..3 must each land on a distinct output. Validates "
        "the basic bit-field decode and the master-port fan-out."
    )

    t = testset.new_make_test('route_bits', flags='CASE=route_bits',
                              checker=_check_route_bits,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Selector bits [13:12] (offset=12, width=2). Four addresses at "
        "0x1000 stride (0x0000, 0x1000, 0x2000, 0x3000) must each land "
        "on a distinct output. Validates that the demux honours the "
        "configured offset instead of always slicing from bit 0."
    )

    t = testset.new_make_test('route_write', flags='CASE=route_write',
                              checker=_check_route_write,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Two outputs, two write requests. Validates that the request "
        "opcode (is_write) is forwarded verbatim to the selected "
        "downstream — a regression that would be invisible on reads."
    )

    t = testset.new_make_test('single_output', flags='CASE=single_output',
                              checker=_check_single_output,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Edge case width=0: a single output port. Every request, "
        "regardless of address, must reach output_0. Validates that a "
        "degenerate configuration still produces a working passthrough."
    )

