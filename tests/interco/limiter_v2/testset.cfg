from gvtest.testsuite import *

import re


def _cycles(output: str, who: str, event: str) -> list:
    """Return the cycle numbers where ``[cycle] who event`` appears."""
    rx = re.compile(rf'^\[(\d+)\] {re.escape(who)} {re.escape(event)}\b')
    out = []
    for line in output.splitlines():
        m = rx.match(line)
        if m:
            out.append(int(m.group(1)))
    return out


def _count(output: str, who: str, event: str) -> int:
    return len(_cycles(output, who, event))


def _check_passthrough(test, output, *args, **kwargs):
    # size==4, bandwidth==64: one chunk, one target REQ, one master RESP or
    # DONE (inline target returns DONE, so the limiter GRANTs upstream and
    # later RESPs once the sub-chunk's DONE lands on output_resp).
    if _count(output, 'mem', 'REQ') != 1:
        return False, f'Expected 1 REQ at mem, got {_count(output, "mem", "REQ")}'
    if _count(output, 'master', 'GRANTED') != 1:
        return False, f'Expected 1 GRANTED on master, got {_count(output, "master", "GRANTED")}'
    if _count(output, 'master', 'RESP') != 1:
        return False, f'Expected 1 RESP on master, got {_count(output, "master", "RESP")}'
    return True, 'single-chunk passthrough'


def _check_split_chunks(test, output, *args, **kwargs):
    # size=16, bandwidth=4 -> exactly 4 target REQs, spaced one per cycle,
    # and exactly one master RESP (completion tracked on parent).
    reqs = _cycles(output, 'mem', 'REQ')
    if len(reqs) != 4:
        return False, f'Expected 4 chunks at mem, got {len(reqs)}: {reqs}'
    # Check 1 REQ per cycle: each consecutive pair must differ by 1 cycle.
    deltas = [reqs[i+1] - reqs[i] for i in range(len(reqs) - 1)]
    if any(d != 1 for d in deltas):
        return False, f'Chunks not 1/cycle: {reqs}'
    if _count(output, 'master', 'RESP') != 1:
        return False, f'Expected 1 RESP on master, got {_count(output, "master", "RESP")}'
    return True, f'4 chunks 1/cycle at {reqs}'


def _check_busy_deny(test, output, *args, **kwargs):
    # Second CPU req arrives mid-stream and must be DENIED at least once, then
    # eventually GRANTED (via RETRY). Both CPU reqs must finish with RESP.
    if _count(output, 'master', 'DENIED') < 1:
        return False, 'Expected at least one DENIED on master'
    if _count(output, 'master', 'RETRY') < 1:
        return False, 'Expected at least one RETRY on master'
    if _count(output, 'master', 'RESP') != 2:
        return False, f'Expected 2 RESPs on master, got {_count(output, "master", "RESP")}'
    return True, 'second request denied then retried, both completed'


def _check_downstream_granted(test, output, *args, **kwargs):
    # 4 chunks emitted one per cycle, each responding 10 cycles later.
    # The master must see exactly one RESP (collapsed at parent level) and
    # that RESP must not land before the last chunk's response time. First
    # chunk goes at cycle 11 (event armed at 10, fires at 11), last chunk at
    # cycle 14, last response at cycle 14+10=24. Allow a +/- 2 cycle margin.
    reqs = _cycles(output, 'mem', 'REQ')
    if len(reqs) != 4:
        return False, f'Expected 4 chunks at mem, got {len(reqs)}: {reqs}'
    resps = _cycles(output, 'master', 'RESP')
    if len(resps) != 1:
        return False, f'Expected 1 RESP on master, got {len(resps)}: {resps}'
    # Last chunk at reqs[-1], response arrives 10 cycles later.
    min_resp = reqs[-1] + 10
    if resps[0] < min_resp:
        return False, f'Master RESP too early: got {resps[0]}, expected >= {min_resp}'
    return True, f'GRANTED chunks, final RESP at {resps[0]}'


def _check_downstream_denied(test, output, *args, **kwargs):
    # First chunk goes out, target DENIES (retry_delay=5). The limiter must
    # hold the denied chunk and not emit further chunks until the output
    # retries. We should see at least one DENY from mem and no RESP from the
    # master within the limited run window.
    deny_count = len([l for l in output.splitlines() if ' mem REQ ' in l])
    # At least one chunk was attempted. We don't enforce the exact number of
    # retries because the stub loops through its deny rule; what matters is
    # that the master did NOT see a completion (parent still has outstanding
    # chunks stuck downstream).
    if deny_count < 1:
        return False, f'Expected at least 1 REQ attempt at mem, got {deny_count}'
    # With a pure-deny target, the parent should never complete — no RESP on
    # the master. GRANTED yes, RESP no.
    if _count(output, 'master', 'GRANTED') != 1:
        return False, f'Expected 1 GRANTED on master, got {_count(output, "master", "GRANTED")}'
    if _count(output, 'master', 'RESP') != 0:
        return False, 'Did not expect any RESP with pure-deny target'
    return True, f'downstream deny held parent open ({deny_count} attempts)'


def _check_write_split(test, output, *args, **kwargs):
    # size=32, bandwidth=8 -> 4 write chunks. All must be marked write=1 at mem.
    mem_lines = [l for l in output.splitlines() if ' mem REQ ' in l]
    if len(mem_lines) != 4:
        return False, f'Expected 4 write chunks at mem, got {len(mem_lines)}'
    if any('write=0' in l for l in mem_lines):
        return False, f'Not all chunks were writes: {mem_lines}'
    if _count(output, 'master', 'RESP') != 1:
        return False, f'Expected 1 master RESP, got {_count(output, "master", "RESP")}'
    return True, '4 write chunks, all is_write=1'


def _check_back_to_back(test, output, *args, **kwargs):
    # bandwidth=8, two size-8 requests at cycles 10 and 12. Both fit in one
    # chunk; neither should be DENIED, and both must complete.
    if _count(output, 'master', 'DENIED') != 0:
        return False, f'Did not expect DENIED, got {_count(output, "master", "DENIED")}'
    if _count(output, 'mem', 'REQ') != 2:
        return False, f'Expected 2 mem REQs, got {_count(output, "mem", "REQ")}'
    if _count(output, 'master', 'RESP') != 2:
        return False, f'Expected 2 master RESPs, got {_count(output, "master", "RESP")}'
    return True, 'two single-chunk requests back-to-back'


def _check_invalid_chunk(test, output, *args, **kwargs):
    # One chunk hits done_invalid. The parent must receive exactly one RESP
    # with status=1 (IO_RESP_INVALID). All 4 chunks must still be consumed.
    if _count(output, 'mem', 'REQ') != 4:
        return False, f'Expected 4 mem REQs, got {_count(output, "mem", "REQ")}'
    resps = [l for l in output.splitlines() if ' master RESP ' in l]
    if len(resps) != 1:
        return False, f'Expected 1 master RESP, got {len(resps)}'
    if 'status=1' not in resps[0]:
        return False, f'Expected IO_RESP_INVALID latched on parent, got: {resps[0]}'
    return True, 'mid-stream INVALID latched on parent'


def testset_build(testset):
    testset.set_name('limiter_v2')
    testset.set_components(["interco.limiter_v2"])

    t = testset.new_make_test('passthrough', flags='CASE=passthrough',
                              checker=_check_passthrough)
    t.add_description(
        "Single CPU request whose size fits within one bandwidth chunk. "
        "Validates the happy path of Limiter::input_req / event_handler: "
        "one sub-request is emitted, forwarded inline, and the parent is "
        "completed via the response path."
    )

    t = testset.new_make_test('split_chunks', flags='CASE=split_chunks',
                              checker=_check_split_chunks)
    t.add_description(
        "CPU request size=16, bandwidth=4. Validates the core splitting "
        "loop: exactly four sub-requests, one per cycle, all linked back to "
        "the same parent, and a single master-visible RESP once the last "
        "chunk's response lands."
    )

    t = testset.new_make_test('busy_deny', flags='CASE=busy_deny',
                              checker=_check_busy_deny)
    t.add_description(
        "A second CPU request arrives while another is still being emitted "
        "and must be refused with IO_REQ_DENIED. Validates the "
        "input_needs_retry flag and the upstream retry() fired from "
        "event_handler / check_last_chunk once the first request frees the "
        "limiter."
    )

    t = testset.new_make_test('downstream_granted', flags='CASE=downstream_granted',
                              checker=_check_downstream_granted)
    t.add_description(
        "Downstream target replies GRANTED + deferred resp. Chunks are "
        "emitted one per cycle while their responses arrive asynchronously. "
        "Validates the output_resp / finish_chunk path and the parent "
        "remaining_size accounting used to collapse per-chunk completions."
    )

    t = testset.new_make_test('downstream_denied', flags='CASE=downstream_denied',
                              checker=_check_downstream_denied)
    t.add_description(
        "Downstream target DENIES the first forwarded chunk. Validates the "
        "denied_sub parking mechanism: the limiter stops emitting further "
        "chunks and re-sends the exact same sub-request from output_retry "
        "when the downstream fires retry()."
    )

    t = testset.new_make_test('write_split', flags='CASE=write_split',
                              checker=_check_write_split)
    t.add_description(
        "Write request split into four chunks. Validates that "
        "event_handler forwards the parent's opcode (is_write) onto every "
        "sub-request — a regression that would be invisible on reads."
    )

    t = testset.new_make_test('back_to_back', flags='CASE=back_to_back',
                              checker=_check_back_to_back)
    t.add_description(
        "Two size==bandwidth requests issued two cycles apart. The first "
        "frees the emission slot on the same cycle it is latched, so the "
        "second must be accepted without a DENY. Validates that "
        "pending_req is cleared as soon as the last chunk is emitted (not "
        "when responses come back)."
    )

    t = testset.new_make_test('invalid_chunk', flags='CASE=invalid_chunk',
                              checker=_check_invalid_chunk)
    t.add_description(
        "One of four chunks hits a done_invalid region. Validates that the "
        "limiter latches IO_RESP_INVALID onto the parent without aborting "
        "the remaining chunks — the parent sees a single RESP whose "
        "response status is invalid."
    )
