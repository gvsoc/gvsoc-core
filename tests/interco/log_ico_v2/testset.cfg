from gvtest.testsuite import *

import re


def _cycles(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[(\d+)\] {re.escape(who)} {re.escape(event)}\b')
    out = []
    for line in output.splitlines():
        m = rx.match(line)
        if m:
            out.append(int(m.group(1)))
    return out


def _count(output: str, who: str, event: str) -> int:
    return len(_cycles(output, who, event))


def _lines(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[\d+\] {re.escape(who)} {re.escape(event)}\b.*$')
    return [l for l in output.splitlines() if rx.match(l)]


def _check_single_master_interleave(test, output, *args, **kwargs):
    # Four requests (0x00..0x30 step 0x10), one per bank. Each bank sees
    # exactly one REQ at its local address 0.
    for i in range(4):
        reqs = _lines(output, f'mem{i}', 'REQ')
        if len(reqs) != 1:
            return False, f'Expected 1 REQ at mem{i}, got {len(reqs)}'
        if 'addr=0x0 ' not in reqs[0]:
            return False, f'mem{i} expected bank-local addr=0x0: {reqs[0]}'
    if _count(output, 'm0', 'DONE') + _count(output, 'm0', 'RESP') != 4:
        return False, 'Expected 4 completions on master'
    return True, 'four banks each got one REQ at local addr 0'


def _check_interleave_roll_over(test, output, *args, **kwargs):
    # Requests: 0x00 (bank 0, local 0), 0x40 (bank 0, local 0x10),
    # 0x50 (bank 1, local 0x10), 0x81 (bank 0, local 0x21).
    mem0 = _lines(output, 'mem0', 'REQ')
    mem1 = _lines(output, 'mem1', 'REQ')
    if len(mem0) != 3:
        return False, f'Expected 3 REQs at mem0, got {len(mem0)}'
    if len(mem1) != 1:
        return False, f'Expected 1 REQ at mem1, got {len(mem1)}'
    # Check that mem0 saw local addresses 0x0, 0x10, 0x21 (in some order).
    expected_mem0 = {'addr=0x0 ', 'addr=0x10 ', 'addr=0x21 '}
    for l in mem0:
        matched = [e for e in expected_mem0 if e in l]
        if not matched:
            return False, f'Unexpected mem0 addr: {l}'
        expected_mem0.discard(matched[0])
    if expected_mem0:
        return False, f'mem0 missed expected addrs: {expected_mem0}'
    if 'addr=0x10 ' not in mem1[0]:
        return False, f'mem1 expected local 0x10: {mem1[0]}'
    return True, 'high-bit compaction rolls local addresses correctly'


def _check_remove_offset(test, output, *args, **kwargs):
    # remove_offset=0x1000. Addresses 0x1000 → bank 0 local 0;
    # 0x1010 → bank 1 local 0.
    mem0 = _lines(output, 'mem0', 'REQ')
    mem1 = _lines(output, 'mem1', 'REQ')
    if len(mem0) != 1 or 'addr=0x0 ' not in mem0[0]:
        return False, f'mem0 expected 1 REQ at local 0, got {mem0}'
    if len(mem1) != 1 or 'addr=0x0 ' not in mem1[0]:
        return False, f'mem1 expected 1 REQ at local 0, got {mem1}'
    return True, 'remove_offset applied before decode'


def _check_multi_master_no_conflict(test, output, *args, **kwargs):
    # m0 → bank 0, m1 → bank 1, both complete without DENY.
    if _count(output, 'm0', 'DENIED') != 0 or _count(output, 'm1', 'DENIED') != 0:
        return False, 'Did not expect any DENIEDs'
    if _count(output, 'mem0', 'REQ') != 1:
        return False, f'mem0 expected 1 REQ, got {_count(output, "mem0", "REQ")}'
    if _count(output, 'mem1', 'REQ') != 1:
        return False, f'mem1 expected 1 REQ, got {_count(output, "mem1", "REQ")}'
    # Both masters saw a completion.
    m0_done = _count(output, 'm0', 'DONE') + _count(output, 'm0', 'RESP')
    m1_done = _count(output, 'm1', 'DONE') + _count(output, 'm1', 'RESP')
    if m0_done != 1 or m1_done != 1:
        return False, f'Expected 1 completion each: m0={m0_done}, m1={m1_done}'
    return True, 'both masters completed without contention'


def _check_multi_master_indep_deny(test, output, *args, **kwargs):
    # m0 hits bank 0 (DENY path). m1 hits bank 1 (normal). m1 must NOT be
    # affected by m0's stall.
    m0_denied = _count(output, 'm0', 'DENIED')
    m1_denied = _count(output, 'm1', 'DENIED')
    if m0_denied < 1:
        return False, 'Expected at least one DENIED on m0'
    if m1_denied != 0:
        return False, f'm1 must not see DENIED (bank 1 is normal), got {m1_denied}'
    # m1 must complete.
    m1_done = _count(output, 'm1', 'DONE') + _count(output, 'm1', 'RESP')
    if m1_done != 1:
        return False, f'm1 must complete (its bank is normal), got {m1_done}'
    # m0 must eventually see a RETRY (bank 0 retries 5 cycles later).
    if _count(output, 'm0', 'RETRY') < 1:
        return False, 'Expected at least one RETRY on m0'
    return True, 'bank-0 DENY on m0 does not block m1 on bank 1'


def _check_multi_master_async_resp(test, output, *args, **kwargs):
    # m0 gets slow resp (20 cycles), m1 fast (5 cycles). Both GRANTED, both
    # RESP'd. m1 RESP must arrive before m0 RESP.
    m0_gr = _count(output, 'm0', 'GRANTED')
    m1_gr = _count(output, 'm1', 'GRANTED')
    if m0_gr != 1 or m1_gr != 1:
        return False, f'Expected 1 GRANTED each: m0={m0_gr}, m1={m1_gr}'
    m0_resp = _cycles(output, 'm0', 'RESP')
    m1_resp = _cycles(output, 'm1', 'RESP')
    if len(m0_resp) != 1 or len(m1_resp) != 1:
        return False, f'Expected 1 RESP each: m0={m0_resp}, m1={m1_resp}'
    if m1_resp[0] >= m0_resp[0]:
        return False, f'm1 (fast) must RESP before m0 (slow): m0={m0_resp}, m1={m1_resp}'
    return True, f'async RESPs routed to correct inputs (m1 at {m1_resp[0]}, m0 at {m0_resp[0]})'


def _check_single_bank(test, output, *args, **kwargs):
    # nb_slaves=1 → every request goes to mem0, and local addr equals
    # original offset (minus remove_offset=0).
    reqs = _lines(output, 'mem0', 'REQ')
    if len(reqs) != 2:
        return False, f'Expected 2 REQs at mem0, got {len(reqs)}'
    if 'addr=0x0 ' not in reqs[0]:
        return False, f'First REQ expected local 0x0: {reqs[0]}'
    if 'addr=0x40 ' not in reqs[1]:
        return False, f'Second REQ expected local 0x40: {reqs[1]}'
    return True, 'single-bank edge case forwards with identity addressing'


def _check_write_through(test, output, *args, **kwargs):
    # Two write requests routed to two banks. Each bank sees write=1.
    for i in range(2):
        reqs = _lines(output, f'mem{i}', 'REQ')
        if len(reqs) != 1:
            return False, f'mem{i} expected 1 REQ, got {len(reqs)}'
        if 'write=1' not in reqs[0]:
            return False, f'mem{i} expected write=1: {reqs[0]}'
    return True, 'write opcode preserved through bank rewrite'


def testset_build(testset):
    testset.set_name('log_ico_v2')
    testset.set_components(["interco.log_ico_v2"])

    t = testset.new_make_test('single_master_interleave',
                              flags='CASE=single_master_interleave',
                              checker=_check_single_master_interleave,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "One master, four banks, 16-byte interleaving. Four consecutive "
        "requests (one granule apart) must hit all four banks in turn, "
        "each at bank-local address 0. Validates the basic bank decode "
        "and bank-local addressing."
    )

    t = testset.new_make_test('interleave_roll_over',
                              flags='CASE=interleave_roll_over',
                              checker=_check_interleave_roll_over,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Requests crossing the first granule sweep (i.e. addresses "
        "beyond ``nb_slaves * granule_size``) must see their high bits "
        "compacted into the bank-local high part. Validates the shift "
        "``((offset >> (slave_bits + iw)) << iw)`` of the address "
        "rewrite."
    )

    t = testset.new_make_test('remove_offset', flags='CASE=remove_offset',
                              checker=_check_remove_offset,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "remove_offset=0x1000 shifts the crossbar's global base. A "
        "request at 0x1000+N decodes the same way as one at N when "
        "remove_offset=0. Validates that remove_offset is subtracted "
        "first, before the bank-id / bank-offset extraction."
    )

    t = testset.new_make_test('multi_master_no_conflict',
                              flags='CASE=multi_master_no_conflict',
                              checker=_check_multi_master_no_conflict,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Two masters, two banks, each master hits a different bank. "
        "No DENY on either side; both complete independently. "
        "Validates the basic multi-master fan-in with no contention."
    )

    t = testset.new_make_test('multi_master_indep_deny',
                              flags='CASE=multi_master_indep_deny',
                              checker=_check_multi_master_indep_deny,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Bank 0 DENYs, bank 1 is normal. The two masters send to their "
        "respective banks concurrently. The master whose bank is "
        "denying must see DENIED + RETRY; the master hitting the normal "
        "bank must complete normally, proving that a per-bank stall "
        "does not leak across the crossbar's other masters."
    )

    t = testset.new_make_test('multi_master_async_resp',
                              flags='CASE=multi_master_async_resp',
                              checker=_check_multi_master_async_resp,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Both masters send GRANTED requests that complete "
        "asynchronously with different delays. Validates that the "
        "InFlight bookkeeping correctly routes each bank's resp() back "
        "to the input port of the master that originated it — the fast "
        "reply must reach its master before the slow reply reaches "
        "the other."
    )

    t = testset.new_make_test('single_bank', flags='CASE=single_bank',
                              checker=_check_single_bank,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Edge case nb_slaves=1 (slave_bits=0). Every request goes to "
        "bank 0 with bank-local address equal to the input offset. "
        "Validates that the decode shifts degenerate cleanly when "
        "there is nothing to slice out."
    )

    t = testset.new_make_test('write_through', flags='CASE=write_through',
                              checker=_check_write_through,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Two write requests routed to two different banks. Validates "
        "that is_write is preserved on the forwarded request — a "
        "regression that would be invisible on reads."
    )
