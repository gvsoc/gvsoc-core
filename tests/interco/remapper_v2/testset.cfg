from gvtest.testsuite import *

import re


def _cycles(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[(\d+)\] {re.escape(who)} {re.escape(event)}\b')
    out = []
    for line in output.splitlines():
        m = rx.match(line)
        if m:
            out.append(int(m.group(1)))
    return out


def _count(output: str, who: str, event: str) -> int:
    return len(_cycles(output, who, event))


def _lines(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[\d+\] {re.escape(who)} {re.escape(event)}\b.*$')
    return [l for l in output.splitlines() if rx.match(l)]


def _mem_req(output):
    reqs = _lines(output, 'mem', 'REQ')
    if len(reqs) != 1:
        return None, f'Expected 1 REQ at mem, got {len(reqs)}'
    return reqs[0], None


def _check_remap_in_window(test, output, *args, **kwargs):
    # 0x1040 inside [0x1000, 0x1100) → target 0x2000 + 0x40 = 0x2040.
    req, err = _mem_req(output)
    if err:
        return False, err
    if 'addr=0x2040' not in req:
        return False, f'Expected addr=0x2040 at mem, got: {req}'
    return True, 'in-window request remapped'


def _check_at_base(test, output, *args, **kwargs):
    # addr == base → target_base.
    req, err = _mem_req(output)
    if err:
        return False, err
    if 'addr=0x2000' not in req:
        return False, f'Expected addr=0x2000 (target_base), got: {req}'
    return True, 'addr == base rewritten to target_base'


def _check_at_top(test, output, *args, **kwargs):
    # addr == base+size-1 → target_base + size - 1.
    req, err = _mem_req(output)
    if err:
        return False, err
    if 'addr=0x20ff' not in req:
        return False, f'Expected addr=0x20ff, got: {req}'
    return True, 'last byte in window rewritten to target_base+size-1'


def _check_just_past_end(test, output, *args, **kwargs):
    # addr == base+size → outside window (half-open). Forwarded unchanged.
    req, err = _mem_req(output)
    if err:
        return False, err
    if 'addr=0x1100' not in req:
        return False, f'Expected addr=0x1100 (unchanged), got: {req}'
    return True, 'addr == base+size is outside, left unchanged'


def _check_just_below_base(test, output, *args, **kwargs):
    # addr == base-1 → outside, unchanged.
    req, err = _mem_req(output)
    if err:
        return False, err
    if 'addr=0xfff' not in req:
        return False, f'Expected addr=0xfff (unchanged), got: {req}'
    return True, 'addr below base left unchanged'


def _check_size_zero(test, output, *args, **kwargs):
    # Every request is a passthrough when size=0.
    reqs = _lines(output, 'mem', 'REQ')
    if len(reqs) != 3:
        return False, f'Expected 3 passthrough REQs at mem, got {len(reqs)}'
    want_addrs = ['addr=0x1000', 'addr=0x2000', 'addr=0xfff']
    for w in want_addrs:
        if not any(w in r for r in reqs):
            return False, f'Missing unchanged addr {w} in mem REQs: {reqs}'
    return True, 'size=0 forwards every address unchanged'


def _check_no_op_map(test, output, *args, **kwargs):
    # target_base == base → address preserved. Completion path still works.
    req, err = _mem_req(output)
    if err:
        return False, err
    if 'addr=0x1040' not in req:
        return False, f'Expected addr=0x1040 (no-op), got: {req}'
    completions = (_count(output, 'master', 'DONE')
                   + _count(output, 'master', 'RESP'))
    if completions != 1:
        return False, f'Expected 1 master completion, got {completions}'
    return True, 'no-op remap forwards address and completes'


def _check_write_remap(test, output, *args, **kwargs):
    req, err = _mem_req(output)
    if err:
        return False, err
    if 'addr=0x2010' not in req:
        return False, f'Write expected at 0x2010, got: {req}'
    if 'write=1' not in req:
        return False, f'Expected is_write=1, got: {req}'
    return True, 'write is remapped and opcode preserved'


def _check_async_resp(test, output, *args, **kwargs):
    # Request routed into window, target GRANTED + resp after 12 cycles.
    # Master sees exactly one GRANTED and one RESP.
    req, err = _mem_req(output)
    if err:
        return False, err
    if 'addr=0x2010' not in req:
        return False, f'Expected remapped addr 0x2010, got: {req}'
    if _count(output, 'master', 'GRANTED') != 1:
        return False, 'Expected 1 GRANTED on master'
    resps = _cycles(output, 'master', 'RESP')
    if len(resps) != 1:
        return False, f'Expected 1 RESP, got {resps}'
    # Issue at cycle 10, resp_delay=12, so RESP >= cycle 22.
    if resps[0] < 22:
        return False, f'RESP too early: {resps[0]}'
    return True, f'async RESP forwarded at cycle {resps[0]}'


def _check_deny_retry(test, output, *args, **kwargs):
    # mem denies (retry_delay=5). Master must see DENIED then RETRY.
    if _count(output, 'master', 'DENIED') < 1:
        return False, 'Expected at least one DENIED on master'
    if _count(output, 'master', 'RETRY') < 1:
        return False, 'Expected at least one RETRY on master'
    return True, 'DENY/RETRY forwarded through remapper'


def testset_build(testset):
    testset.set_name('remapper_v2')
    testset.set_components(["interco.remapper_v2"])

    t = testset.new_make_test('remap_in_window', flags='CASE=remap_in_window',
                              checker=_check_remap_in_window,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Request in the middle of the remap window. Validates the "
        "linear rewrite ``addr_out = target_base + (addr_in - base)``."
    )

    t = testset.new_make_test('at_base', flags='CASE=at_base',
                              checker=_check_at_base,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Request at exactly the window's base address. Validates the "
        "inclusive lower bound of the window — addr == base is "
        "in-window and must be rewritten to target_base."
    )

    t = testset.new_make_test('at_top', flags='CASE=at_top',
                              checker=_check_at_top,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Request at the last byte of the window (addr == base+size-1). "
        "Must be rewritten to target_base+size-1. Validates that the "
        "upper bound rewrite does not off-by-one."
    )

    t = testset.new_make_test('just_past_end', flags='CASE=just_past_end',
                              checker=_check_just_past_end,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Request at exactly base+size — one byte past the last byte of "
        "the window. Must be forwarded UNCHANGED (the window is a "
        "half-open interval). Validates the exclusive upper bound."
    )

    t = testset.new_make_test('just_below_base', flags='CASE=just_below_base',
                              checker=_check_just_below_base,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Request one byte below the window's base. Must be forwarded "
        "unchanged. Validates that addresses below the window are not "
        "accidentally pulled into the remap."
    )

    t = testset.new_make_test('size_zero', flags='CASE=size_zero',
                              checker=_check_size_zero,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Edge case size=0: the window is empty; every request, "
        "whatever its address, is forwarded unchanged. Validates the "
        "``size == 0`` short-circuit in the in_window test."
    )

    t = testset.new_make_test('no_op_map', flags='CASE=no_op_map',
                              checker=_check_no_op_map,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "target_base == base: in-window requests are rewritten to the "
        "same address they came in with. Validates that the DENY/RETRY "
        "plumbing still runs correctly through a degenerate no-op "
        "remap."
    )

    t = testset.new_make_test('write_remap', flags='CASE=write_remap',
                              checker=_check_write_remap,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Write request targeting the remap window. The downstream "
        "must see is_write=1 at the rewritten address. Catches a "
        "regression where the opcode would be dropped during the "
        "address rewrite."
    )

    t = testset.new_make_test('async_resp', flags='CASE=async_resp',
                              checker=_check_async_resp,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Downstream returns IO_REQ_GRANTED + deferred resp. The "
        "remapper must propagate GRANTED upstream and forward the "
        "subsequent resp through its input slave port. Validates the "
        "asynchronous completion path."
    )

    t = testset.new_make_test('deny_retry', flags='CASE=deny_retry',
                              checker=_check_deny_retry,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Downstream DENYs with retry_delay=5. The remapper must "
        "restore the original address, propagate DENIED upstream, "
        "and relay retry() on its input port once the downstream "
        "clears. Validates the full DENY/RETRY handshake including "
        "address rollback."
    )
