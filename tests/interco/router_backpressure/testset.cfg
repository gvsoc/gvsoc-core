from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_backpressure')

    # bandwidth=0, latency=0: a single read completes in a zero-cycle
    # forward path (target returns DONE inline). Smoke test for the basic
    # decode-and-forward, no scheduling involved.
    testset.new_make_test('done_passthrough', flags='CASE=done_passthrough')

    # bandwidth=0, router latency=3. Target answers DONE immediately.
    # Verifies that the per-router ``latency`` is honoured: upstream sees
    # the response at the issue cycle + 3.
    testset.new_make_test('router_latency',   flags='CASE=router_latency')

    # Per-mapping latency=5 with router latency=0. Verifies the additive
    # mapping_latency path: total reported latency = max(input_bw,
    # output_bw) + mapping_latency, here just 5.
    testset.new_make_test('mapping_latency',  flags='CASE=mapping_latency')

    # bandwidth=4, two 16-byte reads back-to-back at cycles 10 and 11.
    # The second forward is throttled by the per-input/per-output
    # watermarks so the router schedules it for later via a ClockEvent
    # (delayed-forward path). Verifies the bandwidth model interacts with
    # the deferred-send queue.
    testset.new_make_test('bandwidth',        flags='CASE=bandwidth')

    # Target returns IO_REQ_GRANTED with resp_delay=10, router latency=3.
    # Verifies that router latency is applied on top of a deferred target
    # response: upstream sees resp at issue + 3 + 10.
    testset.new_make_test('granted_delay',    flags='CASE=target_granted_plus_router_latency')

    # Target denies every attempt with retry_delay=5. Verifies that the
    # router propagates DENIED to the master and forwards the downstream
    # retry() back, exercising the full deny→wait→retry handshake. The
    # check focuses on the first deny + retry pair in the log; subsequent
    # iterations would loop forever.
    testset.new_make_test('denied_retry',     flags='CASE=denied_then_retry')

    # Read at 0x2000_0000, outside any mapping. Router answers
    # IO_RESP_INVALID without forwarding.
    testset.new_make_test('out_of_mapping',   flags='CASE=out_of_mapping')
