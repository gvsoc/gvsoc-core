from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_bandwidth')

    # bandwidth=0, latency=0: a single 4-byte read completes inline at the
    # same cycle. Smoke test for the rate-unconstrained pass-through path.
    testset.new_make_test('done_passthrough',         flags='CASE=done_passthrough')

    # bandwidth=4, three 16-byte reads issued back-to-back at cycles 10, 11,
    # 12. With the bandwidth router every request is *accepted* immediately
    # (no DENY) — but the per-input/per-output watermarks force each
    # response's reported latency to grow by ``ceil(size/bandwidth) = 4``
    # cycles. Verifies that the router pipelines outstanding requests
    # without handshaking.
    testset.new_make_test('no_deny_burst',            flags='CASE=no_deny_burst')

    # Four 16-byte reads issued at cycle 0 to the same target. With
    # bandwidth=4 each request takes 4 cycles, so the responses' reported
    # latencies should stack as 4, 8, 12, 16. Verifies the per-output
    # watermark advances by exactly ``burst_duration`` per accepted forward.
    testset.new_make_test('bandwidth_latency_stack',  flags='CASE=bandwidth_latency_stack')

    # Single 16-byte read with router ``latency=2`` and ``bandwidth=4``.
    # Expected reported latency = 2 (router) + 4 (burst_duration) = 6.
    # Verifies the per-router latency adds on top of the bandwidth
    # contribution and that wall-clock stays at the issue cycle.
    testset.new_make_test('latency_annotation',       flags='CASE=latency_annotation')

    # One master pushes three 16-byte reads at cycles 10, 11, 12 targeting
    # *three different* outputs. Without the per-input watermark each
    # request would see latency=4 (only its own output's watermark
    # matters); with the per-input watermark the master itself is the
    # bottleneck and latencies stack as 4, 7, 10. Verifies that the input
    # watermark prevents a single initiator from exceeding its share of
    # the global bandwidth.
    testset.new_make_test('input_throttle_two_outputs', flags='CASE=input_throttle_two_outputs')

    # Read at 0x2000_0000, outside any mapping. Router responds
    # IO_RESP_INVALID and bumps the ``errors`` stat without forwarding.
    testset.new_make_test('out_of_mapping',           flags='CASE=out_of_mapping')
