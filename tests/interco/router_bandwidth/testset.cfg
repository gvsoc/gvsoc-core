from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_bandwidth')
    testset.set_components(["interco.router_v2.bandwidth"])

    t = testset.new_make_test('done_passthrough', flags='CASE=done_passthrough', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "Smoke test for the rate-unconstrained pass-through path: with "
        "bandwidth=0 and latency=0 a single 4-byte read completes inline at "
        "the same cycle as its send."
    )

    t = testset.new_make_test('no_deny_burst', flags='CASE=no_deny_burst', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "Three 16-byte reads issued back-to-back at cycles 10, 11, 12 with "
        "bandwidth=4. Verifies that every request is accepted immediately "
        "(no DENY) but the per-input/per-output watermarks grow each "
        "response's reported latency by ceil(size/bandwidth) = 4 cycles — "
        "i.e. the router pipelines without handshaking."
    )

    t = testset.new_make_test('bandwidth_latency_stack', flags='CASE=bandwidth_latency_stack', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "Four 16-byte reads issued at cycle 0 to the same target with "
        "bandwidth=4. Expects the responses' reported latencies to stack "
        "as 4, 8, 12, 16, proving the per-output watermark advances by "
        "exactly burst_duration per accepted forward."
    )

    t = testset.new_make_test('latency_annotation', flags='CASE=latency_annotation', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "One 16-byte read with router latency=2 and bandwidth=4. Expects "
        "reported latency = 2 (router) + 4 (burst_duration) = 6 — verifies "
        "that per-router latency adds on top of the bandwidth contribution "
        "without advancing wall-clock beyond the issue cycle."
    )

    t = testset.new_make_test('input_throttle_two_outputs',
                              flags='CASE=input_throttle_two_outputs',
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "One master pushes three 16-byte reads at cycles 10, 11, 12 to "
        "*three different* outputs. The per-input watermark makes the "
        "master itself the bottleneck, so latencies stack as 4, 7, 10 — "
        "verifies that a single initiator cannot exceed its share of the "
        "global bandwidth even when outputs are free."
    )

    t = testset.new_make_test('out_of_mapping', flags='CASE=out_of_mapping', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "Read at 0x20000000, outside any mapping. Router responds "
        "IO_RESP_INVALID and bumps the ``errors`` stat without forwarding."
    )
