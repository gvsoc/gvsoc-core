from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_beat')

    # A single 4-byte read at cycle 10 to one target. Smoke test for the
    # basic decode-and-forward path: master SEND, router GRANTED, fsm wakes
    # one cycle later, target completes inline, master sees RESP. Verifies
    # the happy single-master / single-output path.
    testset.new_make_test('single_beat',         flags='CASE=single_beat')

    # A 4-beat burst (16 bytes total at width=4) from one master to one
    # target. Verifies that the burst-table slot survives across the
    # is_first..is_last beats, that the per-burst burst_id remap is stable
    # across the round trip, and that max_input_pending_size=64 holds all
    # in-flight beats without back-pressure.
    testset.new_make_test('burst4',              flags='CASE=burst4')

    # Two masters issue a 4-beat burst at the same cycle to the same
    # target. Verifies round-robin arbitration *between* bursts (a
    # starting input keeps the output until is_last) and burst atomicity
    # *within* a burst (no interleaving of the two streams' beats on the
    # output channel).
    testset.new_make_test('two_masters_contend', flags='CASE=two_masters_contend')

    # A single 8-byte beat sent through a router with width=4. Exercises
    # the "beat too large" guard in req_muxed — the router immediately
    # responds IO_RESP_INVALID and increments the ``errors`` stat without
    # ever forwarding.
    testset.new_make_test('size_over_width',     flags='CASE=size_over_width')

    # Target denies the first 2 beats of a 4-beat burst (deny_then_done
    # with deny_count=2 and retry_delay=3), then accepts. Verifies that
    # the output's ``stalled`` flag is set on each IO_REQ_DENIED, that the
    # FIFO holds the head beat across the stall, and that retry_muxed
    # cleanly resumes forwarding from the same head.
    testset.new_make_test('deny_mid_burst',      flags='CASE=deny_mid_burst')

    # Target answers IO_REQ_GRANTED with a 5-cycle resp_delay. Verifies
    # the deferred-response path: the router stays out of the way, the
    # master sees GRANTED, and the target's late resp() reaches the
    # master via resp_muxed.
    testset.new_make_test('granted_resp_delay',  flags='CASE=granted_resp_delay')

    # Target denies the first beat twice then accepts subsequent attempts
    # with IO_REQ_GRANTED + resp_delay=5. Exercises the full
    # DENY → retry → re-forward → GRANTED → deferred resp chain in a
    # single test.
    testset.new_make_test('deny_then_granted',   flags='CASE=deny_then_granted')

    # Target denies the first beat once with a long retry_delay=10, so
    # the output stalls and beats back up in the router FIFO. With
    # max_input_pending_size=8 (2 beats of size 4) and a 4-beat burst,
    # the 3rd and 4th beats are denied *upstream* (the router runs out
    # of FIFO space). Verifies that ``denied_upstream`` triggers retry()
    # to the master once the FIFO drains.
    testset.new_make_test('fifo_overflow',       flags='CASE=fifo_overflow')

    # Two routers in series — master → router_a → router_b → target —
    # with a single beat. Verifies the chained mapping decode and that
    # each router adds one cycle of latency (one fsm tick per router).
    testset.new_make_test('cascade_single',      flags='CASE=cascade_single')

    # A 4-beat burst through the same cascade. Verifies that beats
    # pipeline across both routers: the Nth beat reaches the target at
    # ``master_send_cycle + 2``, with steady-state throughput of 1
    # beat/cycle.
    testset.new_make_test('cascade_burst4',      flags='CASE=cascade_burst4')

    # Target denies the first beat of a 2-beat burst once then accepts.
    # Verifies that the burst-id remap chain survives a deny across two
    # routers (slot-id remap in router_b is reverted on deny, then
    # re-applied on the re-forward).
    testset.new_make_test('cascade_deny',        flags='CASE=cascade_deny')

    # Two single-beat bursts to the same output on the same cycle — one
    # read (master_a), one write (master_b) — with the default
    # shared_rw_channel=False. Asserts that both RESP lines land on the
    # same cycle, proving the read and write channels are independent
    # on the shared output.
    testset.new_make_test('shared_rw_channel_split',  flags='CASE=shared_rw_channel_split',
        checker=_check_shared_rw_channel_split)

    # Same scenario as ``shared_rw_channel_split`` but with
    # ``shared_rw_channel=True``. Asserts that the two RESP cycles are
    # exactly one apart, proving R and W serialise through the single
    # shared slot.
    testset.new_make_test('shared_rw_channel_shared', flags='CASE=shared_rw_channel_shared',
        checker=_check_shared_rw_channel_shared)

    # Sustained-throughput proof. Two 8-beat bursts (one R, one W) start
    # at the same cycle on the same output with
    # ``shared_rw_channel=False``. Asserts that the 16 beats complete in
    # 8 cycles → 2.0 beats/cycle, and that beat ``i`` lands on the same
    # cycle for R and W (the channels run in lockstep).
    testset.new_make_test('shared_rw_channel_bandwidth_split',
        flags='CASE=shared_rw_channel_bandwidth_split',
        checker=_check_shared_rw_channel_bandwidth_split)

    # Same workload as the split case but with ``shared_rw_channel=True``.
    # Asserts that the 16 beats complete in 16 cycles → 1.0 beat/cycle —
    # exactly half the throughput, since burst atomicity makes the
    # second burst wait for the first to release the shared channel.
    testset.new_make_test('shared_rw_channel_bandwidth_shared',
        flags='CASE=shared_rw_channel_bandwidth_shared',
        checker=_check_shared_rw_channel_bandwidth_shared)


def _resp_cycles(output: str) -> dict[str, int]:
    """Extract one ``RESP`` cycle per burst name from a stub_master log."""
    import re
    cycles: dict[str, int] = {}
    for line in output.splitlines():
        m = re.search(r'^\[(\d+)\] master_[ab] RESP name=([RW])#\d+ status=0', line)
        if m and m.group(2) not in cycles:
            cycles[m.group(2)] = int(m.group(1))
    return cycles


def _check_shared_rw_channel_split(test, output, *args, **kwargs):
    cycles = _resp_cycles(output)
    if 'R' not in cycles or 'W' not in cycles:
        return False, f'Missing RESP for R or W (got {cycles})'
    if cycles['R'] != cycles['W']:
        return False, (f'Expected R and W to complete on the same cycle with '
                       f'separate channels; got R={cycles["R"]} W={cycles["W"]}')
    return True, f'R and W both completed at cycle {cycles["R"]}'


def _check_shared_rw_channel_shared(test, output, *args, **kwargs):
    cycles = _resp_cycles(output)
    if 'R' not in cycles or 'W' not in cycles:
        return False, f'Missing RESP for R or W (got {cycles})'
    diff = abs(cycles['R'] - cycles['W'])
    if diff != 1:
        return False, (f'Expected R and W to complete one cycle apart with a '
                       f'shared channel; got R={cycles["R"]} W={cycles["W"]} '
                       f'(diff={diff})')
    return True, f'R and W serialised: R={cycles["R"]} W={cycles["W"]}'


def _all_resp_cycles(output: str) -> dict[str, list[int]]:
    """Group every successful ``RESP`` cycle by burst name."""
    import re
    cycles: dict[str, list[int]] = {'R': [], 'W': []}
    for line in output.splitlines():
        m = re.search(r'^\[(\d+)\] master_[ab] RESP name=([RW])#\d+ status=0', line)
        if m:
            cycles[m.group(2)].append(int(m.group(1)))
    return cycles


# Number of beats per burst in shared_rw_channel_bandwidth_{split,shared}.
# Must match build_case() in test.py.
_BW_NB_BEATS = 8


def _check_shared_rw_channel_bandwidth_split(test, output, *args, **kwargs):
    cycles = _all_resp_cycles(output)
    nb = _BW_NB_BEATS
    if len(cycles['R']) != nb or len(cycles['W']) != nb:
        return False, (f'Expected {nb} beats each direction; got '
                       f'R={len(cycles["R"])} W={len(cycles["W"])}')
    # Both bursts pipeline at 1 beat/cycle on independent channels, starting
    # together — so beat #i lands on the same cycle for R and W, and the burst
    # spans exactly ``nb`` cycles.
    for i in range(nb):
        if cycles['R'][i] != cycles['W'][i]:
            return False, (f'Beat #{i} mismatch: R={cycles["R"][i]} '
                           f'W={cycles["W"][i]} — channels not parallel')
    span = cycles['R'][-1] - cycles['R'][0] + 1
    if span != nb:
        return False, (f'Expected {nb}-cycle pipelined burst; got {span} cycles '
                       f'({cycles["R"][0]}..{cycles["R"][-1]})')
    total_beats = 2 * nb
    bw = total_beats / span
    return True, (f'{total_beats} beats over {span} cycles → {bw:.1f} beats/cycle '
                  f'(2x channel split confirmed)')


def _check_shared_rw_channel_bandwidth_shared(test, output, *args, **kwargs):
    cycles = _all_resp_cycles(output)
    nb = _BW_NB_BEATS
    if len(cycles['R']) != nb or len(cycles['W']) != nb:
        return False, (f'Expected {nb} beats each direction; got '
                       f'R={len(cycles["R"])} W={len(cycles["W"])}')
    # With burst atomicity the elected burst monopolises the shared channel
    # until its is_last beat. So the second burst starts only after the first
    # finishes, and the total span is 2*nb cycles for 2*nb beats — exactly the
    # halved throughput we want to assert.
    all_resp = sorted(cycles['R'] + cycles['W'])
    span = all_resp[-1] - all_resp[0] + 1
    total_beats = 2 * nb
    if span != total_beats:
        return False, (f'Expected {total_beats}-cycle serialised span; got {span} '
                       f'cycles ({all_resp[0]}..{all_resp[-1]})')
    bw = total_beats / span
    return True, (f'{total_beats} beats over {span} cycles → {bw:.1f} beats/cycle '
                  f'(shared channel halves throughput vs split)')
