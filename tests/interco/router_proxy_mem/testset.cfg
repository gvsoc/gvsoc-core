from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_proxy_mem')
    testset.set_components([
        "interco.router_v2.untimed",
        "interco.router_v2.bandwidth",
        "interco.router_v2.backpressure",
        "interco.router_v2.beat",
    ])

    for kind in ['untimed', 'bandwidth', 'backpressure', 'beat']:
        t = testset.new_make_test(kind, flags=f'CASE={kind}',
                                  build_resource='gvsoc.core.build', no_clean=True)
        t.add_description(
            f"Proxy mem_read/mem_write through two cascaded '{kind}' routers "
            "into memory_v3, with the simulation paused the whole time "
            "(control script never calls run()). Covers the backdoor "
            "debug-memory map: level-1 access, rebased level-2 access "
            "through the router cascade, and clean errors on a level-2 "
            "hole and an unmapped level-1 address."
        )
