from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_untimed')

    testset.new_make_test('done_passthrough',    flags='CASE=done_passthrough')
    testset.new_make_test('burst_back_to_back',  flags='CASE=burst_back_to_back')
    testset.new_make_test('target_granted_delay', flags='CASE=target_granted_delay')
    testset.new_make_test('target_deny_retry',   flags='CASE=target_deny_retry')
    testset.new_make_test('out_of_mapping',      flags='CASE=out_of_mapping')
