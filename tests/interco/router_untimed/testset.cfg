from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_untimed')
    testset.set_components(["interco.router_v2.untimed"])

    t = testset.new_make_test('done_passthrough', flags='CASE=done_passthrough')
    t.add_description(
        "Smoke test for the zero-timing decode-and-forward path: a single "
        "read at cycle 10 completes inline via IO_REQ_DONE, proving the "
        "basic pass-through through one master and one target."
    )

    t = testset.new_make_test('burst_back_to_back', flags='CASE=burst_back_to_back')
    t.add_description(
        "Three reads issued at cycles 10, 11, 12. The untimed router applies "
        "no timing model, so every request completes synchronously at its "
        "own send cycle — verifies there is no queueing nor latency stacking."
    )

    t = testset.new_make_test('target_granted_delay', flags='CASE=target_granted_delay')
    t.add_description(
        "Target answers IO_REQ_GRANTED with a 5-cycle resp_delay. Verifies "
        "the deferred-response path: the master sees GRANTED first and then "
        "the late resp() reaches the right input via InFlight tracking."
    )

    t = testset.new_make_test('target_deny_retry', flags='CASE=target_deny_retry')
    t.add_description(
        "Target denies the first attempt (deny_count=1, retry_delay=3) then "
        "accepts. Verifies that DENY propagates unchanged, retry() is "
        "broadcast to every input, and the master cleanly re-sends."
    )

    t = testset.new_make_test('out_of_mapping', flags='CASE=out_of_mapping')
    t.add_description(
        "Request at 0x20000000, outside any registered mapping. Verifies "
        "the router sets IO_RESP_INVALID and returns IO_REQ_DONE without "
        "forwarding."
    )
