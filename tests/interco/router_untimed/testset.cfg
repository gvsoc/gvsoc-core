from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('router_untimed')

    # Smoke test for the zero-timing decode-and-forward path: one master
    # issues a single read at cycle 10 to a single target, which completes
    # inline. Verifies the basic IO_REQ_DONE pass-through.
    testset.new_make_test('done_passthrough',    flags='CASE=done_passthrough')

    # Three back-to-back reads at cycles 10, 11 and 12. Since the untimed
    # router applies no timing model, every request completes synchronously
    # at its own send cycle (no queueing, no latency stacking).
    testset.new_make_test('burst_back_to_back',  flags='CASE=burst_back_to_back')

    # Target answers IO_REQ_GRANTED with a 5-cycle resp_delay. The untimed
    # router is a pure pass-through, so the master sees GRANTED first and
    # the response arrives 5 cycles later — verifies the deferred-response
    # path through the InFlight tracking that the untimed router still
    # needs to route resp() back to the right input.
    testset.new_make_test('target_granted_delay', flags='CASE=target_granted_delay')

    # Target denies the first attempt then accepts (deny_then_done with
    # deny_count=1 and retry_delay=3). The untimed router propagates DENY
    # straight through to the master, broadcasts retry() to every input,
    # and the master re-sends. Verifies the broadcast-retry behaviour.
    testset.new_make_test('target_deny_retry',   flags='CASE=target_deny_retry')

    # Master issues a request at 0x2000_0000, outside any registered
    # mapping. Verifies that the router sets IO_RESP_INVALID and returns
    # IO_REQ_DONE without forwarding.
    testset.new_make_test('out_of_mapping',      flags='CASE=out_of_mapping')
