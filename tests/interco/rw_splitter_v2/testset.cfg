from gvtest.testsuite import *

import re


def _cycles(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[(\d+)\] {re.escape(who)} {re.escape(event)}\b')
    out = []
    for line in output.splitlines():
        m = rx.match(line)
        if m:
            out.append(int(m.group(1)))
    return out


def _count(output: str, who: str, event: str) -> int:
    return len(_cycles(output, who, event))


def _lines(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[\d+\] {re.escape(who)} {re.escape(event)}\b.*$')
    return [l for l in output.splitlines() if rx.match(l)]


def _check_read_only(test, output, *args, **kwargs):
    # Read request goes to mem_read; mem_write is untouched.
    if _count(output, 'mem_read', 'REQ') != 1:
        return False, f'mem_read expected 1 REQ, got {_count(output, "mem_read", "REQ")}'
    if _count(output, 'mem_write', 'REQ') != 0:
        return False, f'mem_write must be untouched, got {_count(output, "mem_write", "REQ")}'
    if _count(output, 'master', 'DONE') + _count(output, 'master', 'RESP') != 1:
        return False, 'Expected 1 master completion'
    return True, 'read routed to output_read only'


def _check_write_only(test, output, *args, **kwargs):
    # Write request goes to mem_write; mem_read is untouched.
    if _count(output, 'mem_write', 'REQ') != 1:
        return False, f'mem_write expected 1 REQ, got {_count(output, "mem_write", "REQ")}'
    if _count(output, 'mem_read', 'REQ') != 0:
        return False, f'mem_read must be untouched, got {_count(output, "mem_read", "REQ")}'
    writes = _lines(output, 'mem_write', 'REQ')
    if 'write=1' not in writes[0]:
        return False, f'Expected write=1 at mem_write: {writes[0]}'
    return True, 'write routed to output_write only'


def _check_mixed(test, output, *args, **kwargs):
    # Two reads + two writes, each direction goes to the correct output.
    if _count(output, 'mem_read', 'REQ') != 2:
        return False, f'mem_read expected 2 reads, got {_count(output, "mem_read", "REQ")}'
    if _count(output, 'mem_write', 'REQ') != 2:
        return False, f'mem_write expected 2 writes, got {_count(output, "mem_write", "REQ")}'
    # Sanity: no cross-contamination.
    for l in _lines(output, 'mem_read', 'REQ'):
        if 'write=1' in l:
            return False, f'mem_read saw a write: {l}'
    for l in _lines(output, 'mem_write', 'REQ'):
        if 'write=0' in l:
            return False, f'mem_write saw a read: {l}'
    return True, '4 interleaved requests correctly demuxed by opcode'


def _check_async_read(test, output, *args, **kwargs):
    # Read is async (GRANTED + resp after 12 cycles). Write is sync.
    if _count(output, 'master', 'GRANTED') != 1:
        return False, 'Expected 1 GRANTED on master (for the read)'
    resps = _cycles(output, 'master', 'RESP')
    if len(resps) != 1:
        return False, f'Expected 1 RESP, got {resps}'
    # Read was issued at cycle 10, resp_delay=12, so RESP >= 22.
    if resps[0] < 22:
        return False, f'Async RESP too early: {resps[0]}'
    return True, f'async read RESP forwarded at {resps[0]}'


def _check_async_write(test, output, *args, **kwargs):
    # Same shape as async_read but on the write side.
    if _count(output, 'master', 'GRANTED') != 1:
        return False, 'Expected 1 GRANTED on master (for the write)'
    resps = _cycles(output, 'master', 'RESP')
    if len(resps) != 1:
        return False, f'Expected 1 RESP, got {resps}'
    if resps[0] < 22:
        return False, f'Async RESP too early: {resps[0]}'
    return True, f'async write RESP forwarded at {resps[0]}'


def _check_deny_read_only(test, output, *args, **kwargs):
    # Read downstream denies. Master sees DENIED then RETRY.
    if _count(output, 'master', 'DENIED') < 1:
        return False, 'Expected at least one DENIED on master'
    if _count(output, 'master', 'RETRY') < 1:
        return False, 'Expected at least one RETRY on master'
    # mem_write must not see any traffic.
    if _count(output, 'mem_write', 'REQ') != 0:
        return False, f'mem_write must be untouched: {_count(output, "mem_write", "REQ")}'
    return True, 'read-side DENY/RETRY plumbed through'


def _check_deny_write_only(test, output, *args, **kwargs):
    # Symmetric to deny_read_only.
    if _count(output, 'master', 'DENIED') < 1:
        return False, 'Expected at least one DENIED on master'
    if _count(output, 'master', 'RETRY') < 1:
        return False, 'Expected at least one RETRY on master'
    if _count(output, 'mem_read', 'REQ') != 0:
        return False, f'mem_read must be untouched: {_count(output, "mem_read", "REQ")}'
    return True, 'write-side DENY/RETRY plumbed through'


def _check_atomic_counts_as_write(test, output, *args, **kwargs):
    # is_write=True is routed to mem_write regardless of whether the
    # caller considered it an atomic; mem_read is untouched.
    if _count(output, 'mem_write', 'REQ') != 1:
        return False, f'mem_write expected 1 REQ, got {_count(output, "mem_write", "REQ")}'
    if _count(output, 'mem_read', 'REQ') != 0:
        return False, f'mem_read must be untouched: {_count(output, "mem_read", "REQ")}'
    return True, 'write-like opcode routed to output_write'


def testset_build(testset):
    testset.set_name('rw_splitter_v2')
    testset.set_components(["interco.rw_splitter_v2"])

    t = testset.new_make_test('read_only', flags='CASE=read_only',
                              checker=_check_read_only,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Single read request. Validates that a read is routed to "
        "``output_read`` and does not touch ``output_write``."
    )

    t = testset.new_make_test('write_only', flags='CASE=write_only',
                              checker=_check_write_only,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Single write request. Validates that a write is routed to "
        "``output_write`` and does not touch ``output_read``. The "
        "is_write flag is preserved on the forwarded request."
    )

    t = testset.new_make_test('mixed', flags='CASE=mixed',
                              checker=_check_mixed,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Two reads and two writes interleaved. Each direction must "
        "land on the correct output with no cross-contamination."
    )

    t = testset.new_make_test('async_read', flags='CASE=async_read',
                              checker=_check_async_read,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Read downstream returns IO_REQ_GRANTED + deferred resp. "
        "Validates that the read-side muxed master correctly routes "
        "the asynchronous response back through the input slave port."
    )

    t = testset.new_make_test('async_write', flags='CASE=async_write',
                              checker=_check_async_write,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Write downstream returns IO_REQ_GRANTED + deferred resp. "
        "Symmetric of async_read; validates the write-side async path."
    )

    t = testset.new_make_test('deny_read_only', flags='CASE=deny_read_only',
                              checker=_check_deny_read_only,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Read downstream DENYs with retry_delay=5. Validates that "
        "DENIED is propagated upstream, that ``denied_output`` is "
        "latched as the read id, and that ``input_itf.retry()`` is "
        "fired when the read side fires its retry."
    )

    t = testset.new_make_test('deny_write_only', flags='CASE=deny_write_only',
                              checker=_check_deny_write_only,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Write downstream DENYs with retry_delay=5. Symmetric of "
        "deny_read_only; validates the write-side DENY/RETRY plumbing "
        "and that DENYs on the two directions are tracked "
        "independently."
    )

    t = testset.new_make_test('atomic_counts_as_write',
                              flags='CASE=atomic_counts_as_write',
                              checker=_check_atomic_counts_as_write,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "A write-like request (is_write=1) is routed to ``output_write`` "
        "regardless of the specific opcode. Documents that the splitter "
        "uses only the read/write bit for classification — clients that "
        "want finer-grained atomic routing must adapt upstream."
    )
