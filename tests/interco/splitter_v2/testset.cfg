from gvtest.testsuite import *

import re


def _cycles(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[(\d+)\] {re.escape(who)} {re.escape(event)}\b')
    out = []
    for line in output.splitlines():
        m = rx.match(line)
        if m:
            out.append(int(m.group(1)))
    return out


def _count(output: str, who: str, event: str) -> int:
    return len(_cycles(output, who, event))


def _lines(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[\d+\] {re.escape(who)} {re.escape(event)}\b.*$')
    return [l for l in output.splitlines() if rx.match(l)]


def _check_aligned_full(test, output, *args, **kwargs):
    # Each of the four outputs must see exactly one REQ of 4 bytes at the
    # expected address: 0x0, 0x4, 0x8, 0xc.
    expected_addrs = [0x00, 0x04, 0x08, 0x0c]
    for i, want in enumerate(expected_addrs):
        reqs = _lines(output, f'mem{i}', 'REQ')
        if len(reqs) != 1:
            return False, f'mem{i} expected 1 REQ, got {len(reqs)}'
        if f'addr=0x{want:x}' not in reqs[0] or 'size=4' not in reqs[0]:
            return False, f'mem{i} expected 4 bytes at 0x{want:x}, got: {reqs[0]}'
    if _count(output, 'master', 'DONE') != 1:
        return False, f'Expected single master DONE, got {_count(output, "master", "DONE")}'
    return True, 'four aligned 4-byte chunks, one per output'


def _check_unaligned_head(test, output, *args, **kwargs):
    # addr=0x02, size=12 → chunks: (0x02,2), (0x04,4), (0x08,4), (0x0c,2).
    specs = [(0x02, 2), (0x04, 4), (0x08, 4), (0x0c, 2)]
    for i, (addr, sz) in enumerate(specs):
        reqs = _lines(output, f'mem{i}', 'REQ')
        if len(reqs) != 1:
            return False, f'mem{i} expected 1 REQ, got {len(reqs)}'
        if f'addr=0x{addr:x}' not in reqs[0] or f'size={sz}' not in reqs[0]:
            return False, f'mem{i} expected {sz}B at 0x{addr:x}, got: {reqs[0]}'
    return True, 'unaligned head produces 2+4+4+2 split'


def _check_partial_fanout(test, output, *args, **kwargs):
    # size=5 uses outputs 0 and 1 only; outputs 2, 3 must see no REQ.
    mem0 = _lines(output, 'mem0', 'REQ')
    mem1 = _lines(output, 'mem1', 'REQ')
    mem2 = _lines(output, 'mem2', 'REQ')
    mem3 = _lines(output, 'mem3', 'REQ')
    if len(mem0) != 1 or 'size=4' not in mem0[0]:
        return False, f'mem0 expected 4-byte chunk, got: {mem0}'
    if len(mem1) != 1 or 'size=1' not in mem1[0]:
        return False, f'mem1 expected 1-byte tail, got: {mem1}'
    if mem2 or mem3:
        return False, f'mem2/mem3 must be idle, got: mem2={mem2}, mem3={mem3}'
    return True, 'partial fan-out leaves unused outputs idle'


def _check_write_split(test, output, *args, **kwargs):
    # All four chunks must be writes.
    for i in range(4):
        reqs = _lines(output, f'mem{i}', 'REQ')
        if len(reqs) != 1:
            return False, f'mem{i} expected 1 REQ'
        if 'write=1' not in reqs[0]:
            return False, f'mem{i} expected write=1: {reqs[0]}'
    return True, 'write opcode preserved on every sub-request'


def _check_async_resp(test, output, *args, **kwargs):
    # Four async GRANTED responses with delays 5,10,15,20 cycles. Parent
    # completes only after the slowest (issue cycle 10 + 20 = cycle 30 or
    # slightly later). Master sees one GRANTED then one RESP.
    if _count(output, 'master', 'GRANTED') != 1:
        return False, 'Expected 1 GRANTED on master'
    resps = _cycles(output, 'master', 'RESP')
    if len(resps) != 1:
        return False, f'Expected 1 RESP, got {resps}'
    if resps[0] < 30:
        return False, f'Parent must wait for slowest chunk (>=30), got {resps[0]}'
    return True, f'parent RESP at {resps[0]} (slowest chunk dominates)'


def _check_output_deny_retry(test, output, *args, **kwargs):
    # Output 0 denies repeatedly (the stub_target's DENIED behaviour stays
    # denied for the whole run); outputs 1-3 return DONE inline. The
    # splitter must:
    #   - return GRANTED upstream (since one chunk is still stuck)
    #   - NOT bubble any DENIED/RETRY to the master
    #   - keep re-sending the denied chunk on every mem0 retry
    # The parent never completes within the run window because mem0 never
    # accepts — which is fine; the point of the test is that the splitter
    # absorbs the back-pressure on one output without perturbing the
    # upstream.
    if _count(output, 'master', 'GRANTED') != 1:
        return False, f'Expected 1 GRANTED on master, got {_count(output, "master", "GRANTED")}'
    if _count(output, 'master', 'DENIED') != 0:
        return False, f'Master should not see DENIED: {_count(output, "master", "DENIED")}'
    if _count(output, 'master', 'RETRY') != 0:
        return False, f'Master should not see RETRY: {_count(output, "master", "RETRY")}'
    # mem0 must have been hit at least twice (first DENY, then retry).
    if _count(output, 'mem0', 'REQ') < 2:
        return False, f'mem0 must see the DENIED chunk re-sent on retry: {_count(output, "mem0", "REQ")}'
    # The other outputs must each see exactly one REQ (their chunk completed
    # inline and is not retried).
    for i in range(1, 4):
        if _count(output, f'mem{i}', 'REQ') != 1:
            return False, f'mem{i} expected 1 REQ, got {_count(output, f"mem{i}", "REQ")}'
    return True, 'sub-request DENY absorbed internally; upstream stays GRANTED'


def _check_upstream_deny(test, output, *args, **kwargs):
    # Slow async responses (30 cycles). Second CPU request at cycle 12
    # must be DENIED by the splitter and retried later.
    if _count(output, 'master', 'DENIED') < 1:
        return False, 'Second CPU request must be DENIED upstream'
    if _count(output, 'master', 'RETRY') < 1:
        return False, 'Splitter must RETRY upstream once parent 1 completes'
    resps = _cycles(output, 'master', 'RESP')
    if len(resps) != 2:
        return False, f'Expected 2 RESPs (both parents eventually complete), got {len(resps)}'
    return True, 'upstream DENY + RETRY handshake works with two parents'


def _check_partial_invalid(test, output, *args, **kwargs):
    # All four outputs receive a REQ. Every chunk is DONE inline (three OK,
    # one INVALID), so the splitter returns DONE inline to the master with
    # IO_RESP_INVALID latched.
    for i in range(4):
        if _count(output, f'mem{i}', 'REQ') != 1:
            return False, f'mem{i} expected 1 REQ'
    dones = _lines(output, 'master', 'DONE')
    if len(dones) != 1:
        return False, f'Expected 1 master DONE, got {len(dones)}'
    if 'status=1' not in dones[0]:
        return False, f'Parent should have IO_RESP_INVALID latched: {dones[0]}'
    return True, 'INVALID sub-response latched on parent without aborting other chunks'


def _check_oversize_reject(test, output, *args, **kwargs):
    # size=32 > input_width=16. No output must see any REQ. Master sees
    # DONE with status=1 (INVALID).
    for i in range(4):
        if _count(output, f'mem{i}', 'REQ') != 0:
            return False, f'mem{i} must not see any traffic for oversized req'
    dones = _lines(output, 'master', 'DONE')
    if len(dones) != 1 or 'status=1' not in dones[0]:
        return False, f'Expected DONE with INVALID, got: {dones}'
    return True, 'oversized request refused with IO_RESP_INVALID'


def testset_build(testset):
    testset.set_name('splitter_v2')
    testset.set_components(["interco.splitter_v2"])

    t = testset.new_make_test('aligned_full', flags='CASE=aligned_full',
                              checker=_check_aligned_full,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Full-width, aligned request (input_width=16, output_width=4). "
        "Verifies that the input is split into four aligned 4-byte "
        "chunks, each delivered to the matching output port at the "
        "expected address."
    )

    t = testset.new_make_test('unaligned_head', flags='CASE=unaligned_head',
                              checker=_check_unaligned_head,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Unaligned start (addr=0x02). The first chunk must be truncated "
        "to the next output_width boundary (2 bytes), subsequent chunks "
        "naturally aligned, and the tail chunk re-truncated. Validates "
        "the ``output_width - (addr & (ow-1))`` logic of the first "
        "sub-request."
    )

    t = testset.new_make_test('partial_fanout', flags='CASE=partial_fanout',
                              checker=_check_partial_fanout,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Request smaller than input_width (size=5). Only a prefix of "
        "output ports receives any traffic; later outputs stay idle. "
        "Validates the fan-out loop's early termination when size "
        "runs out."
    )

    t = testset.new_make_test('write_split', flags='CASE=write_split',
                              checker=_check_write_split,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Write request split across all four outputs. Each sub-request "
        "must carry is_write=1. Validates that the opcode is forwarded "
        "through the split — a regression that would be invisible on "
        "reads."
    )

    t = testset.new_make_test('async_resp', flags='CASE=async_resp',
                              checker=_check_async_resp,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Each of the four outputs replies asynchronously with a "
        "different delay (5, 10, 15, 20 cycles). The parent must "
        "complete only after the slowest chunk — validates the "
        "``parent->remaining_size`` accounting and that the splitter "
        "does not prematurely resp() the parent."
    )

    t = testset.new_make_test('output_deny_retry', flags='CASE=output_deny_retry',
                              checker=_check_output_deny_retry,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "One output DENYs its chunk (retry_delay=5); the other three "
        "return DONE inline. The splitter must park the denied "
        "sub-request in ``stuck[0]`` and re-send on that output's "
        "retry, without bubbling the DENIED to the upstream master."
    )

    t = testset.new_make_test('upstream_deny', flags='CASE=upstream_deny',
                              checker=_check_upstream_deny,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Two CPU requests arrive back-to-back while chunks are still "
        "in flight. The splitter accepts the first (GRANTED) and "
        "DENYs the second; once the first parent completes, the "
        "splitter fires input retry() and the second parent goes "
        "through. Validates the one-parent-at-a-time invariant and "
        "the ``input_needs_retry`` flag."
    )

    t = testset.new_make_test('partial_invalid', flags='CASE=partial_invalid',
                              checker=_check_partial_invalid,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "One chunk's downstream returns IO_RESP_INVALID while the "
        "other three return OK. The parent must complete with "
        "IO_RESP_INVALID latched, and all four chunks must still "
        "have been accounted for (the splitter does not abort "
        "remaining chunks on error)."
    )

    t = testset.new_make_test('oversize_reject', flags='CASE=oversize_reject',
                              checker=_check_oversize_reject,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Request whose size exceeds input_width. The splitter refuses "
        "up front with IO_REQ_DONE + IO_RESP_INVALID; no output sees "
        "any traffic. Validates the oversize guard that replaces v1's "
        "silent hang on uncovered bytes."
    )
