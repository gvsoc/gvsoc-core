from gvtest import *

# Called by gvtest to declare the tests
def testset_build(testset):

    testset.set_name('interco')

    testset.import_testset(file='router/testset.cfg')
    testset.import_testset(file='router_untimed/testset.cfg')
    testset.import_testset(file='router_bandwidth/testset.cfg')
    testset.import_testset(file='router_backpressure/testset.cfg')
    testset.import_testset(file='router_beat/testset.cfg')
    testset.import_testset(file='limiter_v2/testset.cfg')
    testset.import_testset(file='demux_v2/testset.cfg')
    testset.import_testset(file='log_ico_v2/testset.cfg')
    testset.import_testset(file='remapper_v2/testset.cfg')
    testset.import_testset(file='splitter_v2/testset.cfg')
    testset.import_testset(file='rw_splitter_v2/testset.cfg')
