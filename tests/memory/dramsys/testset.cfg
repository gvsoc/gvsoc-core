"""Stand-alone tests for the memory.dramsys wrapper.

Opt-in: these tests require ``make dramsys_preparation`` in sdk/gvsoc and a
sourced ``sourceme_systemc.sh`` (which exports SYSTEMC_HOME and puts
libDRAMSys_Simulator.so on LD_LIBRARY_PATH). Without those the engine
hasn't been built with VP_USE_SYSTEMC=1 and the wrapper's dlopen would
fail at runtime, so the cases are marked skipped instead.
"""

from gvtest.testsuite import *

import os
import re


DRAMSYS_AVAILABLE = bool(os.environ.get('SYSTEMC_HOME'))
SKIP_REASON = (
    'DRAMSys not prepared — run `make dramsys_preparation` in sdk/gvsoc '
    'and `source sourceme_systemc.sh` before building gvsoc.'
)


def _get_event(output: str, who: str, event: str, name: str):
    """Return the first matching log line, or None.

    Lines look like:
        [<cycle>] master <EVENT> name=<n> [...rest...]
    """
    rx = re.compile(
        rf'^\[\d+\] {re.escape(who)} {re.escape(event)} name={re.escape(name)}\b.*$'
    )
    for line in output.splitlines():
        if rx.match(line):
            return line
    return None


def _check_read_basic(test, output, *args, **kwargs):
    # The wrapper must return PEND for the read (sync says "I'll respond
    # later") and then RESP from the async DRAMSys callback. Don't check
    # data — fresh DRAMSys backing store is unspecified — only that the
    # round-trip completed.
    pend = _get_event(output, 'master', 'PEND', 'r')
    if pend is None:
        return False, 'No PEND line for read — wrapper did not return IO_REQ_PENDING'
    resp = _get_event(output, 'master', 'RESP', 'r')
    if resp is None:
        return False, 'No RESP line for read — async resp() never fired'
    return True, 'read round-trip via PENDING + async resp'


def _check_write_then_read(test, output, *args, **kwargs):
    # Writes can complete sync (DONE) or async (PEND + RESP); accept either.
    w_done = _get_event(output, 'master', 'DONE', 'w')
    w_resp = _get_event(output, 'master', 'RESP', 'w')
    if w_done is None and w_resp is None:
        return False, 'No DONE or RESP line for write'

    # Reads on dramsys are async only.
    r = _get_event(output, 'master', 'RESP', 'r')
    if r is None:
        return False, 'No RESP line for read'

    # The read must observe exactly the byte pattern that was written.
    # data_hex='efbeadde' (little-endian 0xdeadbeef) was written to 0x100.
    if 'data=efbeadde' not in r:
        return False, f'Read did not return the written pattern: {r}'
    return True, 'write-then-read round-trip preserves 4-byte payload'


# Pre-compute the expected XOR per iteration of the large_burst_checksum
# pattern. Must match the per-iteration pattern in test.py: a uniform
# (j*13+17) period-256 fill (XORs to 0 over 4096 bytes) with (i+1)
# stamped into byte 0, so the final XOR is (i+1) for iteration i.
_LARGE_SIZE = 4096
_LARGE_NITERS = 8


def _large_expected_cksum(i: int) -> str:
    return f'checksum={(i + 1) & 0xFF:02x}'


def _check_large_burst_checksum(test, output, *args, **kwargs):
    # For each of the N iterations, both the write's DONE/RESP and the
    # read's RESP must carry the expected XOR for that iteration's
    # pattern. Confirms (a) every burst's 4 KB round-tripped intact and
    # (b) DRAMSys kept each iteration's address-space slice distinct.
    for i in range(_LARGE_NITERS):
        expected = _large_expected_cksum(i)

        w = (_get_event(output, 'master', 'DONE', f'w{i}')
             or _get_event(output, 'master', 'RESP', f'w{i}'))
        if w is None:
            return False, f'No DONE/RESP line for write w{i}'
        if expected not in w:
            return False, f'w{i} checksum mismatch (want {expected}): {w}'

        r = _get_event(output, 'master', 'RESP', f'r{i}')
        if r is None:
            return False, f'No RESP line for read r{i}'
        if expected not in r:
            return False, f'r{i} checksum mismatch (want {expected}): {r}'

    return True, f'{_LARGE_NITERS} x 4 KB bursts each round-trip with matching checksum'


_READ_LOOP_NITERS = 4
_READ_LOOP_EXPECTED = f'checksum={0xa5:02x}'   # base XOR=0, stamp 0xa5 -> final 0xa5


def _line_index(output_lines: list, who: str, event: str, name: str) -> int:
    """Return the 0-based index of the first matching line, or -1."""
    rx = re.compile(
        rf'^\[\d+\] {re.escape(who)} {re.escape(event)} name={re.escape(name)}\b.*$'
    )
    for i, line in enumerate(output_lines):
        if rx.match(line):
            return i
    return -1


def _check_read_loop(test, output, *args, **kwargs):
    # Validates:
    #  1. The write landed with the expected checksum.
    #  2. Each of the N reads returned that same checksum.
    #  3. The chain serialised — stdout LINE order: r(i+1)'s SEND must come
    #     after r(i)'s RESP. (Always-valid invariant.)
    #  4. Each read's RESP CYCLE is strictly later than the previous one's.
    #     Holds because chained issues are deferred via a 1-cycle clock
    #     event whose enqueue triggers was_updated -> the SystemC driver
    #     steps GVSoC forward to current SC time before the issue fires.
    w = (_get_event(output, 'master', 'DONE', 'w')
         or _get_event(output, 'master', 'RESP', 'w'))
    if w is None:
        return False, 'No DONE/RESP for write'
    if _READ_LOOP_EXPECTED not in w:
        return False, f'Write checksum mismatch (want {_READ_LOOP_EXPECTED}): {w}'

    lines = output.splitlines()
    last_cycle = -1
    for i in range(_READ_LOOP_NITERS):
        r = _get_event(output, 'master', 'RESP', f'r{i}')
        if r is None:
            return False, f'No RESP for r{i}'
        if _READ_LOOP_EXPECTED not in r:
            return False, f'r{i} checksum mismatch (want {_READ_LOOP_EXPECTED}): {r}'

        if i > 0:
            prev_resp_idx = _line_index(lines, 'master', 'RESP', f'r{i-1}')
            this_send_idx = _line_index(lines, 'master', 'SEND', f'r{i}')
            if this_send_idx <= prev_resp_idx:
                return False, (f'r{i} SEND (line {this_send_idx}) appears before '
                               f'r{i-1} RESP (line {prev_resp_idx}) in stdout — chain '
                               f'did not serialise')

        m = re.match(r'^\[(\d+)\]', r)
        if not m:
            return False, f'Cannot parse cycle from r{i} line: {r}'
        cycle = int(m.group(1))
        if cycle <= last_cycle:
            return False, (f'r{i} cycle {cycle} not strictly after previous '
                           f'{last_cycle} — clock-event-deferred chain failed to '
                           f'land on distinct cycles: {r}')
        last_cycle = cycle
    return True, (f'{_READ_LOOP_NITERS} chained reads each on distinct, '
                  f'strictly-ordered cycles')


# ---- v2 (beat protocol) cases --------------------------------------------

# HBM2 access_size used as beat_width in the v2 wrapper.
_V2_BEAT_W = 32


def _v2_pattern_xor(size: int) -> int:
    """Same pattern test.py uses for v2 cases — XOR of (j*13+17)&0xFF over
    `size` bytes with byte 0 stamped with 0xa5 to break the period-256
    XOR=0 degeneracy."""
    base = bytearray(((j * 13 + 17) & 0xFF) for j in range(size))
    base[0] ^= 0xa5
    x = 0
    for b in base:
        x ^= b
    return x


def _check_v2_read_basic(test, output, *args, **kwargs):
    # Single-beat read: master must see SEND -> GRANTED -> one BEAT
    # (is_first=is_last=1) -> RESP.
    if _get_event(output, 'master', 'GRANTED', 'r') is None:
        return False, 'No GRANTED for v2 read'
    if _get_event(output, 'master', 'RESP', 'r') is None:
        return False, 'No RESP for v2 read'
    return True, 'v2 single-beat read round-trip via GRANTED + beat resp'


def _check_v2_write_then_read(test, output, *args, **kwargs):
    # Write completed (DONE), read returned the written byte (0xa5).
    if _get_event(output, 'master', 'DONE', 'w') is None:
        return False, 'No DONE for v2 beat-form write'
    r = _get_event(output, 'master', 'RESP', 'r')
    if r is None:
        return False, 'No RESP for v2 read'
    if 'checksum=a5' not in r:
        return False, f'v2 read did not return the written byte: {r}'
    return True, 'v2 write-then-read round-trip preserves payload'


def _check_v2_beat_read_stream(test, output, *args, **kwargs):
    # 4 KB read returned as 128 beats of 32 B each. Every beat (except
    # first/last) should have is_first=0 is_last=0. Cycle on each BEAT
    # line should strictly increase (per-cycle deferral works).
    size = 4096
    expected = _v2_pattern_xor(size)
    expected_str = f'checksum={expected:02x}'
    nbeats = size // _V2_BEAT_W
    lines = output.splitlines()
    rx = re.compile(r'^\[(\d+)\] master BEAT name=r addr=0x[0-9a-f]+ size=\d+ is_first=(\d) is_last=(\d)$')
    beats = []
    for line in lines:
        m = rx.match(line)
        if m:
            beats.append((int(m.group(1)), int(m.group(2)), int(m.group(3))))
    if len(beats) != nbeats:
        return False, f'Expected {nbeats} beats, saw {len(beats)}'
    if beats[0][1] != 1:
        return False, f'First beat not flagged is_first: {beats[0]}'
    if beats[-1][2] != 1:
        return False, f'Last beat not flagged is_last: {beats[-1]}'
    last_cycle = -1
    for cycle, _, _ in beats:
        if cycle <= last_cycle:
            return False, f'Beat cycle {cycle} not after previous {last_cycle}'
        last_cycle = cycle
    r = _get_event(output, 'master', 'RESP', 'r')
    if r is None:
        return False, 'No RESP for v2 read'
    if expected_str not in r:
        return False, f'v2 read checksum mismatch (want {expected_str}): {r}'
    return True, f'{nbeats} beats on strictly-ordered cycles, checksum matches'


def _check_v2_write_beat_form(test, output, *args, **kwargs):
    # All N beat-writes completed (last gets is_last=true), then the
    # follow-up read returns the same checksum.
    size = 4096
    expected_str = f'checksum={_v2_pattern_xor(size):02x}'
    nbeats = size // _V2_BEAT_W
    last_w = _get_event(output, 'master', 'DONE', f'w{nbeats - 1}')
    if last_w is None:
        return False, f'No DONE for last write beat w{nbeats - 1}'
    r = _get_event(output, 'master', 'RESP', 'r')
    if r is None:
        return False, 'No RESP for follow-up read'
    if expected_str not in r:
        return False, f'Read checksum mismatch (want {expected_str}): {r}'
    return True, f'{nbeats}-beat write accumulated correctly; read verified'


def _check_v2_read_loop(test, output, *args, **kwargs):
    # 16 chained 4 KB v2 reads after a beat-form 4 KB write, routed through
    # a v2 beat-kind router (width=32). Each read RESP returns the XOR of
    # the full 4 KB pattern, and successive RESPs land on strictly later
    # cycles (proves the chain deferred via clock event).
    total_size = 4096
    base = bytearray(((j * 13 + 17) & 0xFF) for j in range(total_size))
    base[0] = 0xa5
    x = 0
    for b in base:
        x ^= b
    expected_str = f'checksum={x:02x}'
    nreads = 16
    last_cycle = -1
    for i in range(nreads):
        r = _get_event(output, 'master', 'RESP', f'r{i}')
        if r is None:
            return False, f'No RESP for r{i}'
        if expected_str not in r:
            return False, f'r{i} checksum mismatch (want {expected_str}): {r}'
        m = re.match(r'^\[(\d+)\]', r)
        cycle = int(m.group(1))
        if cycle <= last_cycle:
            return False, f'r{i} cycle {cycle} not after previous {last_cycle}'
        last_cycle = cycle
    return True, f'{nreads} chained 4 KB v2 reads (via router) on distinct, ordered cycles'


def testset_build(testset):
    testset.set_name('dramsys')
    testset.set_components(['memory.dramsys', 'memory.dramsys_v2'])

    cases = [
        # v1 cases (default).
        ('read_basic',           _check_read_basic),
        ('write_then_read',      _check_write_then_read),
        ('large_burst_checksum', _check_large_burst_checksum),
        ('read_loop',            _check_read_loop),
        # v2 cases.
        ('v2_read_basic',        _check_v2_read_basic),
        ('v2_write_then_read',   _check_v2_write_then_read),
        ('v2_beat_read_stream',  _check_v2_beat_read_stream),
        ('v2_write_beat_form',   _check_v2_write_beat_form),
        ('v2_read_loop',         _check_v2_read_loop),
    ]

    for case_name, checker in cases:
        t = testset.new_make_test(case_name,
                                  flags=f'CASE={case_name}',
                                  checker=checker,
                                  build_resource='gvsoc.core.build',
                                  no_clean=True)
        if not DRAMSYS_AVAILABLE:
            t.skip(SKIP_REASON)
