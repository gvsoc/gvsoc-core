from gvtest.testsuite import *

import re


def _lines(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[\d+\] {re.escape(who)} {re.escape(event)}\b.*$')
    return [l for l in output.splitlines() if rx.match(l)]


def _count(output: str, who: str, event: str) -> int:
    return len(_lines(output, who, event))


def _get_done(output, name):
    """Return the first master DONE line for the named request, or None."""
    rx = re.compile(rf'^\[\d+\] master DONE name={re.escape(name)}\b.*$')
    for l in output.splitlines():
        if rx.match(l):
            return l
    return None


def _latency(line):
    m = re.search(r'latency=(-?\d+)', line)
    return int(m.group(1)) if m else None


def _check_read_basic(test, output, *args, **kwargs):
    # A default-init memory holds 0x57 bytes everywhere, so a 4-byte read
    # at 0x0 must return 0x57575757 and latency >= 1 (MemoryConfig default).
    line = _get_done(output, 'r')
    if line is None:
        return False, 'No master DONE line found for "r"'
    if 'status=0' not in line:
        return False, f'Expected status=0 (OK): {line}'
    if 'data=57575757' not in line:
        return False, f'Expected 0x57 init pattern, got: {line}'
    lat = _latency(line)
    if lat is None or lat < 1:
        return False, f'Expected latency >= 1, got: {line}'
    return True, f'fresh memory returns poison pattern, latency={lat}'


def _check_write_then_read(test, output, *args, **kwargs):
    # After writing 0xdeadbeef at 0x20, reading back must return the same
    # bytes. Writes log their payload too; we care about the read.
    w = _get_done(output, 'w')
    r = _get_done(output, 'r')
    if w is None or r is None:
        return False, f'Missing DONE lines: w={w} r={r}'
    if 'data=deadbeef' not in r:
        return False, f'Read did not return the written pattern: {r}'
    return True, 'write-then-read round-trip preserves payload'


def _check_multi_word(test, output, *args, **kwargs):
    # 16-byte round trip. The master only logs the first 8 bytes; that
    # prefix must match 0x0102030405060708 for both write and read.
    w = _get_done(output, 'w')
    r = _get_done(output, 'r')
    if w is None or r is None:
        return False, f'Missing DONE lines: w={w} r={r}'
    if 'data=0102030405060708' not in r:
        return False, f'Read prefix mismatch: {r}'
    return True, 'multi-word round-trip preserves leading 8 bytes'


def _check_latency_nonzero(test, output, *args, **kwargs):
    # MemoryConfig(latency=5) → the request-side DONE must carry
    # latency >= 5.
    line = _get_done(output, 'r')
    if line is None:
        return False, 'No DONE line found'
    lat = _latency(line)
    if lat is None or lat < 5:
        return False, f'Expected latency >= 5, got: {line}'
    return True, f'latency annotation honoured (>={lat})'


def _check_width_bandwidth(test, output, *args, **kwargs):
    # width_log2=2: 32 bytes take ceil(32/4)=8 cycles.
    # Request 0 at cycle 10: latency = 8.
    # Request 1 at cycle 11: next_packet_start is at 10+8=18, so diff=7.
    # total_latency = max(0, 7) + 8 = 15.
    # (latency=0 in the config for this case.)
    l0 = _get_done(output, 'r0')
    l1 = _get_done(output, 'r1')
    if l0 is None or l1 is None:
        return False, f'Missing DONE lines: l0={l0} l1={l1}'
    lat0 = _latency(l0)
    lat1 = _latency(l1)
    if lat0 is None or lat0 < 8:
        return False, f'r0 expected latency >= 8, got: {l0}'
    if lat1 is None or lat1 < 12:
        return False, f'r1 expected bandwidth-bumped latency >= 12, got: {l1}'
    return True, f'bandwidth model bumps r1 latency (lat0={lat0}, lat1={lat1})'


def _check_out_of_range(test, output, *args, **kwargs):
    # Memory 0x40 bytes; a read of 8 bytes at 0x3c straddles the end.
    # Expect DONE with status=1 (IO_RESP_INVALID).
    line = _get_done(output, 'r_oob')
    if line is None:
        return False, 'No DONE line for r_oob'
    if 'status=1' not in line:
        return False, f'Expected status=1 (INVALID), got: {line}'
    return True, 'out-of-bounds request flagged as INVALID'


def _check_stim_file(test, output, *args, **kwargs):
    # Memory preloaded with 0xef 0xbe 0xad 0xde at offset 0 via stim_file.
    # Reading 4 bytes at 0x0 must return exactly that payload.
    line = _get_done(output, 'r_stim')
    if line is None:
        return False, 'No DONE line for r_stim'
    if 'data=efbeadde' not in line:
        return False, f'Stim preload not observed in read: {line}'
    return True, 'stim_file preload visible via first read'


def testset_build(testset):
    testset.set_name('memory_v3')
    testset.set_components(["memory.memory_v3"])

    t = testset.new_make_test('read_basic', flags='CASE=read_basic',
                              checker=_check_read_basic)
    t.add_description(
        "Simple 4-byte read from a freshly-initialised memory. Validates "
        "the happy-path io_v2 request handling, the default init=True "
        "0x57 poison pattern, and the config's default 1-cycle latency."
    )

    t = testset.new_make_test('write_then_read', flags='CASE=write_then_read',
                              checker=_check_write_then_read)
    t.add_description(
        "Write 0xdeadbeef at offset 0x20, read it back. Validates that "
        "writes land in the backing store and that subsequent reads see "
        "exactly those bytes (no stale init pattern)."
    )

    t = testset.new_make_test('multi_word', flags='CASE=multi_word',
                              checker=_check_multi_word)
    t.add_description(
        "16-byte write + 16-byte read at offset 0x40. Validates that "
        "transfers larger than a word work atomically (single DONE per "
        "request) and preserve byte order through the memcpy path."
    )

    t = testset.new_make_test('latency_nonzero', flags='CASE=latency_nonzero',
                              checker=_check_latency_nonzero)
    t.add_description(
        "MemoryConfig(latency=5). The synchronous DONE must carry "
        "req->latency >= 5. Guards the ``req->inc_latency(cfg.latency)`` "
        "call against regressions."
    )

    t = testset.new_make_test('width_bandwidth', flags='CASE=width_bandwidth',
                              checker=_check_width_bandwidth)
    t.add_description(
        "width_log2=2 (4 B/cyc). Back-to-back 32-byte requests; the "
        "second one's latency must be bumped by the first's tail. "
        "Validates the bandwidth model (next_packet_start + ceil(size/bw))."
    )

    t = testset.new_make_test('out_of_range', flags='CASE=out_of_range',
                              checker=_check_out_of_range)
    t.add_description(
        "8-byte read starting 4 bytes before end of a 64-byte memory. "
        "The straddle must be caught by the ``addr+size > cfg.size`` "
        "check and surface as IO_REQ_DONE + IO_RESP_INVALID."
    )

    t = testset.new_make_test('stim_file', flags='CASE=stim_file',
                              checker=_check_stim_file)
    t.add_description(
        "Preload the memory with a stim_file holding 0xDEADBEEF at "
        "offset 0; verify the first read returns those exact bytes. "
        "Guards the fread path in the constructor."
    )
