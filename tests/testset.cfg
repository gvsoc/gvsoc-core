from gvtest import *

# Called by gvtest to declare the tests
def testset_build(testset):

    testset.set_name('models')

    testset.import_testset(file='interco/testset.cfg')
    testset.import_testset(file='pulp/testset.cfg')
    testset.import_testset(file='cache/testset.cfg')
    testset.import_testset(file='utils/testset.cfg')
