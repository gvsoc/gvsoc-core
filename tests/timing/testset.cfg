from gvtest.testsuite import *


def testset_build(testset):
    testset.set_name('timing')

    t = testset.new_make_test('default', flags='CASE=default', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "No timing level set anywhere: the router's 'auto' kind must "
        "resolve to 'bandwidth' (the built-in 'timed' default) and the "
        "memory keeps its configured latency — i.e. behavior is unchanged "
        "from before the timing-level feature."
    )

    t = testset.new_make_test('functional', flags='CASE=functional', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "set_timing_level('functional') on the chip: the router resolves "
        "to 'untimed' and the memory latency is forced to 0."
    )

    t = testset.new_make_test('cycle', flags='CASE=cycle', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "set_timing_level('cycle') on the chip with a beat width on the "
        "router config: the router resolves to 'beat'. The single-beat "
        "read must still complete through the auto-inserted beat adapter "
        "in front of the io_v2-sync memory."
    )

    t = testset.new_make_test('cycle_no_width', flags='CASE=cycle_no_width', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "Nearest-supported fallback: 'cycle' requested but the router has "
        "no beat width, so it silently snaps to 'timed' ('bandwidth')."
    )

    t = testset.new_make_test('explicit_wins', flags='CASE=explicit_wins', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "An explicit kind='backpressure' wins over the 'functional' level "
        "set on the chip, while the level still zeroes the memory latency."
    )

    t = testset.new_make_test('global_functional', flags='CASE=global_functional TIMING=timing=functional', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "Global level set inside the target string "
        "('test:case=...:timing=functional'): the router resolves to "
        "'untimed' and the memory latency is forced to 0, with no "
        "generator-set level anywhere."
    )

    t = testset.new_make_test('subtree', flags='CASE=subtree TIMING=timing.r_sub=cycle', build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "Per-subtree CLI override: the 'timing.r_sub=cycle' target "
        "qualifier turns only the second router into 'beat'; the first "
        "router and the memories keep the default 'timed' level."
    )
