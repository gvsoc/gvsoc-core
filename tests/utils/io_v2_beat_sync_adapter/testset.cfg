from gvtest.testsuite import *

import re

RESP_RX = re.compile(r'^\[(\d+)\] master RESP .*first=(\d) last=(\d)', re.MULTILINE)
QUIT_RX = re.compile(r'^\[\d+\] master QUIT', re.MULTILINE)


def _make_check(expected_beats):
    """Assert the run finished (no assert abort) and the master observed exactly
    `expected_beats` resp() beats, with is_first on the first and is_last on the
    last. The C++ traces.assert checks (asserts-mode) police the rest."""
    def _check(test, output, *args, **kwargs):
        if not QUIT_RX.search(output):
            return False, 'no master QUIT line (sim aborted, hung, or assert fired)'
        beats = RESP_RX.findall(output)
        if len(beats) != expected_beats:
            return False, f'got {len(beats)} resp beats, expected {expected_beats}'
        if beats[0][1] != '1':
            return False, 'first beat does not have is_first=1'
        if beats[-1][2] != '1':
            return False, 'last beat does not have is_last=1'
        return True, f'{expected_beats} beats, first/last ok'
    return _check


def testset_build(testset):
    testset.set_name('io_v2_beat_sync_adapter')
    testset.set_components(["utils.io_v2_beat_sync_adapter"])

    def add(name, beats, desc):
        t = testset.new_make_test(name, flags=f'CASE={name}',
                                  checker=_make_check(beats),
                                  build_resource='gvsoc.core.build', no_clean=True)
        t.add_description(desc)

    add('r1', 1,
        "Single-beat read (size == beat_width): one resp beat, round-tripping "
        "the master's own descriptor.")
    add('r_multi', 4,
        "32 B read at beat_width 8: four resp beats, each a distinct "
        "adapter-allocated object, paced one per cycle, in-order is_first/is_last.")
    add('w1', 1,
        "Single-beat write: one write-ack beat on the master's own descriptor.")
    add('w_multi', 4,
        "32 B write: four write-ack beats, all round-tripping the master's req.")
    add('lat_dur', 4,
        "Read with target latency=2 + duration=6: get_full_latency()=8 is the head "
        "delay before the first of four beats, which then stream one per cycle.")
    add('err', 2,
        "Sync slave reports IO_RESP_INVALID: every beat of the 16 B read carries "
        "the error status.")
    add('zero', 1,
        "Degenerate zero-size read: exactly one is_first=is_last zero-size beat.")
