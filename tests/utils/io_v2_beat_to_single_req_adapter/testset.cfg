from gvtest.testsuite import *

import re

RESP_RX = re.compile(r'^\[(\d+)\] master RESP .*first=(\d) last=(\d)', re.MULTILINE)
QUIT_RX = re.compile(r'^\[\d+\] master QUIT', re.MULTILINE)
DENY_RX = re.compile(r'^\[\d+\] master DENY ', re.MULTILINE)
RETRY_RX = re.compile(r'^\[\d+\] master RETRY', re.MULTILINE)
# Target-side lines: async resp(), request-path deny + retry().
TGT_RESP_RX = re.compile(r'^\[\d+\] target RESP ', re.MULTILINE)
TGT_DENY_RX = re.compile(r'^\[\d+\] target DENY ', re.MULTILINE)
TGT_RETRY_RX = re.compile(r'^\[\d+\] target RETRY', re.MULTILINE)


def _make_check(expected_beats):
    """Assert the run finished (no assert abort) and the master observed exactly
    `expected_beats` resp() beats, with is_first on the first and is_last on the
    last. The C++ traces.assert checks (asserts-mode) police the rest."""
    def _check(test, output, *args, **kwargs):
        if not QUIT_RX.search(output):
            return False, 'no master QUIT line (sim aborted, hung, or assert fired)'
        beats = RESP_RX.findall(output)
        if len(beats) != expected_beats:
            return False, f'got {len(beats)} resp beats, expected {expected_beats}'
        if beats[0][1] != '1':
            return False, 'first beat does not have is_first=1'
        if beats[-1][2] != '1':
            return False, 'last beat does not have is_last=1'
        return True, f'{expected_beats} beats, first/last ok'
    return _check


def _make_bp_check(expected_beats, expected_denies):
    """Like _make_check, but also assert the response-path back-pressure handshake
    actually fired: exactly `expected_denies` DENY beats, each matched by a RETRY,
    while the master still ends up observing all `expected_beats` accepted beats
    (the adapter held and re-sent the exact denied beat)."""
    base = _make_check(expected_beats)
    def _check(test, output, *args, **kwargs):
        ok, msg = base(test, output, *args, **kwargs)
        if not ok:
            return ok, msg
        denies = len(DENY_RX.findall(output))
        retries = len(RETRY_RX.findall(output))
        if denies != expected_denies:
            return False, f'got {denies} denied beats, expected {expected_denies}'
        # Each explicit deny must be matched by a resp_retry(); the 1-beat/cycle
        # arbiter can add further (STALL-driven) retries, so allow retries >= denies.
        if retries < denies:
            return False, f'got {retries} resp_retry() calls, expected >= {denies}'
        return True, f'{msg}; {denies} deny/retry handshakes'
    return _check


def _make_async_check(expected_beats):
    """Like _make_check, but also assert the target served at least one request
    via the async GRANTED + resp() path (target RESP lines present)."""
    base = _make_check(expected_beats)
    def _check(test, output, *args, **kwargs):
        ok, msg = base(test, output, *args, **kwargs)
        if not ok:
            return ok, msg
        if not TGT_RESP_RX.search(output):
            return False, 'no target RESP line (async resp path not exercised)'
        return True, f'{msg}; async resp path used'
    return _check


INORDER_RX = re.compile(r'responded out of order', re.MULTILINE)
REQHOLD_RX = re.compile(r'^\[\d+\] master REQHOLD ', re.MULTILINE)


def _make_limit_check(expected_beats):
    """Like _make_check, but also assert the read-burst limit back-pressure
    actually engaged: at least one REQHOLD (a read request the adapter DENIED
    because max_read_bursts was reached, held and re-sent by the master)."""
    base = _make_check(expected_beats)
    def _check(test, output, *args, **kwargs):
        ok, msg = base(test, output, *args, **kwargs)
        if not ok:
            return ok, msg
        holds = len(REQHOLD_RX.findall(output))
        if holds < 1:
            return False, ('no REQHOLD — read-burst limit back-pressure never '
                           'engaged')
        return True, f'{msg}; {holds} read-burst back-pressure event(s)'
    return _check


def _make_inorder_assert_check():
    """Negative test: the run MUST abort on the in-order assert (the target was
    told to answer read responses out of order). Pass iff the in-order assert
    fired and the master never reached QUIT."""
    def _check(test, output, *args, **kwargs):
        if QUIT_RX.search(output):
            return False, 'master reached QUIT — the in-order assert did not fire'
        if not INORDER_RX.search(output):
            return False, 'no in-order assertion in output'
        return True, 'in-order assert fired on reordered responses'
    return _check


def _make_deny_check(expected_beats, expected_denies):
    """Like _make_check, but also assert the target request-path back-pressure
    fired: exactly `expected_denies` target DENY lines, each matched by a target
    RETRY, while the master still observes all `expected_beats` beats (the
    adapter held and re-sent each denied sub-read/write)."""
    base = _make_check(expected_beats)
    def _check(test, output, *args, **kwargs):
        ok, msg = base(test, output, *args, **kwargs)
        if not ok:
            return ok, msg
        denies = len(TGT_DENY_RX.findall(output))
        retries = len(TGT_RETRY_RX.findall(output))
        if denies != expected_denies:
            return False, f'got {denies} target denies, expected {expected_denies}'
        if retries != expected_denies:
            return False, f'got {retries} target retry() calls, expected {expected_denies}'
        return True, f'{msg}; {denies} request-path deny/retry handshakes'
    return _check


def testset_build(testset):
    testset.set_name('io_v2_beat_to_single_req_adapter')
    testset.set_components(["utils.io_v2_beat_to_single_req_adapter"])

    def add(name, beats, desc):
        t = testset.new_make_test(name, flags=f'CASE={name}',
                                  checker=_make_check(beats),
                                  build_resource='gvsoc.core.build', no_clean=True)
        t.add_description(desc)

    def add_bp(name, beats, denies, desc):
        t = testset.new_make_test(name, flags=f'CASE={name}',
                                  checker=_make_bp_check(beats, denies),
                                  build_resource='gvsoc.core.build', no_clean=True)
        t.add_description(desc)

    def add_async(name, beats, desc):
        t = testset.new_make_test(name, flags=f'CASE={name}',
                                  checker=_make_async_check(beats),
                                  build_resource='gvsoc.core.build', no_clean=True)
        t.add_description(desc)

    def add_deny(name, beats, denies, desc):
        t = testset.new_make_test(name, flags=f'CASE={name}',
                                  checker=_make_deny_check(beats, denies),
                                  build_resource='gvsoc.core.build', no_clean=True)
        t.add_description(desc)

    def add_limit(name, beats, desc):
        t = testset.new_make_test(name, flags=f'CASE={name}',
                                  checker=_make_limit_check(beats),
                                  build_resource='gvsoc.core.build', no_clean=True)
        t.add_description(desc)

    add('r1', 1,
        "Single-beat read (size == beat_width): one resp beat, round-tripping "
        "the master's own descriptor.")
    add('r_multi', 4,
        "32 B read at beat_width 8: four resp beats, each a distinct "
        "adapter-allocated object, paced one per cycle, in-order is_first/is_last.")
    add('w1', 1,
        "Single-beat write: one write-ack beat on the master's own descriptor.")
    add('w_multi', 4,
        "32 B write: four write-ack beats, all round-tripping the master's req.")
    add('lat_dur', 4,
        "Read with target latency=2 + duration=6: get_full_latency()=8 is the head "
        "delay before the first of four beats, which then stream one per cycle.")
    add('err', 2,
        "Single-req slave reports IO_RESP_INVALID: every beat of the 16 B read "
        "carries the error status.")
    add('zero', 1,
        "Degenerate zero-size read: exactly one is_first=is_last zero-size beat.")

    add_bp('bp_read', 4, 2,
        "32 B read with two middle beats back-pressured: the master returns "
        "IO_RESP_DENIED, the adapter holds the exact beat and re-sends it on "
        "resp_retry(); all four beats are still observed in order.")
    add_bp('bp_write', 4, 2,
        "32 B write with the first and last write-ack beats back-pressured: "
        "deny + resp_retry() on a round-tripped descriptor beat.")
    add_bp('bp_last', 1, 1,
        "Single-beat read with the only (is_last) beat back-pressured: the "
        "adapter holds and re-sends the master's own descriptor.")
    add_bp('bp_all', 4, 4,
        "32 B read (latency=2,duration=6) with every beat back-pressured once: "
        "repeated hold/retry, including a deny right after a previous re-send.")

    add_async('async_read', 1,
        "Single-beat read answered via async GRANTED + resp() instead of inline "
        "IO_REQ_DONE.")
    add_async('async_multi', 4,
        "32 B read: four beat-sized sub-reads each answered async; the adapter "
        "keeps several outstanding and drains them in order.")
    add_async('async_write', 4,
        "32 B write forwarded as one request, answered async; the master still "
        "sees four write-ack beats.")

    add_deny('deny_read', 4, 2,
        "32 B read where the target denies the first two sub-reads then retries: "
        "the adapter holds and re-sends each denied sub-read; all four beats land.")
    add_deny('deny_write', 1, 1,
        "Single-beat write denied once by the target then retried.")
    add_deny('deny_async', 4, 2,
        "Request-path deny/retry combined with the async resp path (32 B read).")

    add_bp('async_bp', 4, 2,
        "Async target plus upstream response back-pressure: two beats denied by "
        "the master and re-sent on resp_retry(), while responses arrive async.")

    add_limit('burst_limit', 5,
        "Five single-beat reads to a slow target with the default "
        "max_read_bursts=4: the 5th read is back-pressured (request-path) until "
        "an earlier burst completes, then re-sent; all five complete.")

    # Negative test: the target answers read responses out of order, which a
    # single-req slave must never do. The adapter must abort on its in-order
    # assert (asserts-mode) rather than deliver a scrambled beat stream. `make
    # run` then exits non-zero (2), so the test declares that as its success code.
    t = testset.new_make_test('ooo', flags='CASE=ooo',
                              checker=_make_inorder_assert_check(),
                              retval=2,
                              build_resource='gvsoc.core.build', no_clean=True)
    t.add_description(
        "Out-of-order read responses trip the adapter's in-order assert "
        "(negative test: the run is expected to abort).")
