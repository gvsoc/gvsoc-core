from gvtest.testsuite import *

import re


# A passing run prints two PASS lines β€” one per tester β€” each with the
# accesses counted and an explicit `cycles=N` field that the checker
# captures (N is elapsed cycles in that tester's clock domain).
PASS_A_RX = re.compile(
    r'^\[\d+\] tester_a PASS writes=(\d+) reads=(\d+) cycles=(\d+)\b',
    re.MULTILINE)
PASS_B_RX = re.compile(
    r'^\[\d+\] tester_b PASS writes=(\d+) reads=(\d+) cycles=(\d+)\b',
    re.MULTILINE)
FAIL_RX   = re.compile(r'^\[\d+\] tester_[ab] FAIL .*$', re.MULTILINE)


def _check_both_pass(test, output, *args, **kwargs):
    fail = FAIL_RX.search(output)
    if fail:
        return False, fail.group(0)
    ma = PASS_A_RX.search(output)
    mb = PASS_B_RX.search(output)
    if ma is None or mb is None:
        missing = []
        if ma is None: missing.append('tester_a')
        if mb is None: missing.append('tester_b')
        return False, f"missing PASS line for: {','.join(missing)}"
    return True, (
        f'tester_a writes={ma.group(1)} reads={ma.group(2)} cycles={ma.group(3)} | '
        f'tester_b writes={mb.group(1)} reads={mb.group(2)} cycles={mb.group(3)}')


def _make_calibration_check(expected_a, expected_b, tolerance_pct):
    """Return a checker that asserts both testers PASS and the cycle counts
    land within ``tolerance_pct`` of the RTL ground-truth values."""
    def _check(test, output, *args, **kwargs):
        ok, msg = _check_both_pass(test, output)
        if not ok:
            return False, msg
        ma = PASS_A_RX.search(output)
        mb = PASS_B_RX.search(output)
        actual_a = int(ma.group(3))
        actual_b = int(mb.group(3))
        delta_a = abs(actual_a - expected_a) / max(expected_a, 1) * 100
        delta_b = abs(actual_b - expected_b) / max(expected_b, 1) * 100
        if delta_a > tolerance_pct:
            return False, (f'tester_a cycles={actual_a} vs expected RTL {expected_a} '
                           f'(Ξ”={delta_a:.1f}% > {tolerance_pct}%)')
        if delta_b > tolerance_pct:
            return False, (f'tester_b cycles={actual_b} vs expected RTL {expected_b} '
                           f'(Ξ”={delta_b:.1f}% > {tolerance_pct}%)')
        return True, (f'tester_a={actual_a} (Ξ”={delta_a:.1f}%) '
                      f'tester_b={actual_b} (Ξ”={delta_b:.1f}%)')
    return _check


def _add(testset, case, bridge, *, description, checker=None):
    """Register one (case, bridge_kind) variant."""
    name = f'{case}_{bridge}'
    t = testset.new_make_test(name, flags=f'CASE={case} BRIDGE={bridge}',
                              checker=checker or _check_both_pass,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(description)
    t.add_bench(
        r'^\[\d+\] tester_a PASS .* cycles=(\d+)',
        f'{name}.cycles_a',
        f'tester_a elapsed cycles ({case} via {bridge})')
    t.add_bench(
        r'^\[\d+\] tester_b PASS .* cycles=(\d+)',
        f'{name}.cycles_b',
        f'tester_b elapsed cycles ({case} via {bridge})')
    return t


# ---------------------------------------------------------------------------
# RTL ground truth β€” captured by running each (case, kind) under the
# Verilator-backed bridges. Each entry maps (case, rtl_kind) to a
# (tester_a_cycles, tester_b_cycles) tuple. The behavioural bridges are
# calibrated against these via the cdc_* _beh tests below.
# ---------------------------------------------------------------------------
RTL_GROUND_TRUTH = {
    ('equal',       'cdc_2phase'):      (260,  260),
    ('equal',       'cdc_fifo_gray'):   (260,  260),
    ('equal',       'cdc_fifo_2phase'): (444,  445),
    ('a_fast',      'cdc_2phase'):      (561,  130),
    ('a_fast',      'cdc_fifo_gray'):   (561,  130),
    ('a_fast',      'cdc_fifo_2phase'): (1025, 260),
    ('a_slow',      'cdc_2phase'):      (130,  561),
    ('a_slow',      'cdc_fifo_gray'):   (130,  561),
    ('a_slow',      'cdc_fifo_2phase'): (260,  1025),
    ('odd_ratio',   'cdc_2phase'):      (960,  322),
    ('odd_ratio',   'cdc_fifo_gray'):   (960,  322),
    ('odd_ratio',   'cdc_fifo_2phase'): (1542, 525),
    ('wide_access', 'cdc_2phase'):      (337,  163),
    ('wide_access', 'cdc_fifo_gray'):   (337,  163),
    ('wide_access', 'cdc_fifo_2phase'): (632,  322),
}

# Calibration tolerance β€” the behavioural model is parametric in integer
# (k_src, k_dst) cycles per direction, which can't reproduce the RTL
# numbers exactly. Β±25% is wide enough to absorb the integer-rounding
# slop yet tight enough that a real regression (k mis-set, missing
# multiplier, etc.) trips the check.
BEH_TOLERANCE_PCT = 25


KINDS = [
    ('sync_only',           'C++ behavioural baseline β€” no modeled CDC latency.'),
    ('cdc_2phase_rtl',      'Verilator-wrapped common_cells cdc_2phase; '
                            'each transfer pays the 2-phase handshake + sync cost.'),
    ('cdc_2phase_beh',      'C++ behavioural model of cdc_2phase β€” '
                            'parametric (k_src, k_dst) cycles per direction. '
                            'Calibrated against cdc_2phase_rtl.'),
    ('cdc_fifo_gray_rtl',   'Verilator-wrapped common_cells cdc_fifo_gray; '
                            'gray-pointer async FIFO with spill register. '
                            'Default LOG_DEPTH=1, SYNC_STAGES=2.'),
    ('cdc_fifo_gray_beh',   'C++ behavioural model of cdc_fifo_gray. Single-'
                            'in-flight produces the same per-transfer cost as '
                            'cdc_2phase_beh.'),
    ('cdc_fifo_2phase_rtl', 'Verilator-wrapped common_cells cdc_fifo_2phase; '
                            'small FIFO whose r/w pointers cross through '
                            'cdc_2phase handshakes. Default LOG_DEPTH=1.'),
    ('cdc_fifo_2phase_beh', 'C++ behavioural model of cdc_fifo_2phase β€” roughly '
                            '2Γ— cdc_2phase. Calibrated against cdc_fifo_2phase_rtl.'),
]

# Map each behavioural kind to its calibration-target RTL kind. Tests for
# *_beh tags use a tolerance checker against the matching RTL numbers.
BEH_TO_RTL = {
    'cdc_2phase_beh':      'cdc_2phase',
    'cdc_fifo_gray_beh':   'cdc_fifo_gray',
    'cdc_fifo_2phase_beh': 'cdc_fifo_2phase',
}

CASES = [
    ('equal',
     "Both clocks at 100 MHz. Bridges still get inserted (distinct clock-source "
     "components) but the per-transfer cost is the lower bound for the chosen kind."),
    ('a_fast',
     "clk_a at 400 MHz, clk_b at 100 MHz."),
    ('a_slow',
     "Mirror of a_fast: clk_a at 100 MHz, clk_b at 400 MHz."),
    ('odd_ratio',
     "3:1 frequency ratio (300 MHz / 100 MHz) with nb_accesses bumped to 32."),
    ('wide_access',
     "8-byte accesses under a 2:1 frequency ratio."),
]


def testset_build(testset):
    testset.set_name('io_v2_clkbridge')
    testset.set_components([
        'utils.io_v2_clock_bridge',
        'utils.io_v2_cdc_rtl_bridge',
        'utils.io_v2_cdc_beh_bridge',
    ])

    for case, case_desc in CASES:
        for kind, kind_desc in KINDS:
            # Behavioural kinds get a tolerance check against the RTL
            # ground truth; everything else just needs to PASS.
            rtl_kind = BEH_TO_RTL.get(kind)
            if rtl_kind is not None and (case, rtl_kind) in RTL_GROUND_TRUTH:
                exp_a, exp_b = RTL_GROUND_TRUTH[(case, rtl_kind)]
                checker = _make_calibration_check(exp_a, exp_b, BEH_TOLERANCE_PCT)
                desc = (f'{case_desc}\n\nBridge kind: {kind_desc}\n'
                        f'Calibration target ({rtl_kind}_rtl): '
                        f'tester_a={exp_a} tester_b={exp_b} Β±{BEH_TOLERANCE_PCT}%')
            else:
                checker = _check_both_pass
                desc = f'{case_desc}\n\nBridge kind: {kind_desc}'
            _add(testset, case, kind, description=desc, checker=checker)

    # ---- Pipelining demonstration tests ---------------------------------
    # Same `equal` traffic, fifo bridges only, sweeping (pipeline_burst,
    # bridge_depth). Captured numbers (cycles=, single-direction symmetric)
    # come from running the matrix on the multi-in-flight bridge β€” they
    # serve as a regression lock for the depth-knob plumbing.
    PIPELINE = [
        # (kind, pipeline_burst, bridge_depth, expected_a, expected_b, label)
        ('cdc_fifo_gray_beh',   1, 1, 226, 226, 'serial baseline'),
        ('cdc_fifo_gray_beh',   1, 4, 226, 226, 'depth alone does not help when tester is serial'),
        ('cdc_fifo_gray_beh',   4, 1, 226, 226, 'bridge total-in-flight cap = 1 forces serial'),
        ('cdc_fifo_gray_beh',   4, 4,  74,  73, 'both pipelined β€” ~3x throughput vs serial'),
        ('cdc_fifo_2phase_beh', 1, 1, 418, 418, 'serial baseline (2-pointer crossing)'),
        ('cdc_fifo_2phase_beh', 4, 1, 418, 418, 'bridge cap forces serial'),
        ('cdc_fifo_2phase_beh', 4, 4, 119, 121, 'both pipelined β€” ~3.5x throughput vs serial'),
    ]
    PIPE_TOLERANCE_PCT = 5

    for kind, pb, bd, exp_a, exp_b, label in PIPELINE:
        name = f'pipeline_{kind}_pb{pb}_bd{bd}'
        t = testset.new_make_test(
            name,
            flags=f'CASE=equal BRIDGE={kind} PIPELINE_BURST={pb} BRIDGE_DEPTH={bd}',
            checker=_make_calibration_check(exp_a, exp_b, PIPE_TOLERANCE_PCT),
            build_resource='gvsoc.core.build',
            no_clean=True)
        t.add_description(
            f'Pipelining demonstration: {label}.\n\n'
            f'pipeline_burst={pb}, bridge_depth={bd}. '
            f'Expected cycles tester_a={exp_a}, tester_b={exp_b} '
            f'Β±{PIPE_TOLERANCE_PCT}%.')
        t.add_bench(
            r'^\[\d+\] tester_a PASS .* cycles=(\d+)',
            f'{name}.cycles_a',
            f'tester_a elapsed cycles (pb={pb} bd={bd}, {kind})')
        t.add_bench(
            r'^\[\d+\] tester_b PASS .* cycles=(\d+)',
            f'{name}.cycles_b',
            f'tester_b elapsed cycles (pb={pb} bd={bd}, {kind})')
