from gvtest.testsuite import *

import re


def _lines(output: str, who: str, event: str) -> list:
    rx = re.compile(rf'^\[\d+\] {re.escape(who)} {re.escape(event)}\b.*$')
    return [l for l in output.splitlines() if rx.match(l)]


def _count(output: str, who: str, event: str) -> int:
    return len(_lines(output, who, event))


def _check_basic_load(test, output, *args, **kwargs):
    # Segment of 16 bytes at 0x1000 + start/entry pulses.
    reqs = _lines(output, 'mem', 'REQ')
    if not reqs:
        return False, 'Expected at least one REQ at mem'
    if 'addr=0x1000' not in reqs[0]:
        return False, f'First REQ should hit 0x1000: {reqs[0]}'
    if 'data=0001020304050607' not in reqs[0]:
        return False, f'First REQ data should start 00..07, got: {reqs[0]}'
    if _count(output, 'sink', 'ENTRY') != 1:
        return False, 'Expected one ENTRY pulse'
    if _count(output, 'sink', 'START') != 1:
        return False, 'Expected one START pulse'
    entries = _lines(output, 'sink', 'ENTRY')
    if 'value=0x1000' not in entries[0]:
        return False, f'ENTRY should be 0x1000, got: {entries[0]}'
    return True, 'single-segment load, entry+start pulsed'


def _check_bss_fill(test, output, *args, **kwargs):
    # filesz=4, memsz=16 → one 4-byte data chunk then one 12-byte zero chunk.
    reqs = _lines(output, 'mem', 'REQ')
    if len(reqs) != 2:
        return False, f'Expected 2 REQs (data + bss), got {len(reqs)}'
    if 'addr=0x1100' not in reqs[0] or 'data=deadbeef' not in reqs[0]:
        return False, f'Data chunk mismatch: {reqs[0]}'
    if 'addr=0x1104' not in reqs[1] or 'size=12' not in reqs[1]:
        return False, f'BSS chunk expected at 0x1104 size=12: {reqs[1]}'
    if 'data=0000000000000000' not in reqs[1]:
        return False, f'BSS chunk should be all zeros, got: {reqs[1]}'
    return True, 'bss fill issued as zero-payload write'


def _check_multi_segment(test, output, *args, **kwargs):
    # Two segments → two writes.
    reqs = _lines(output, 'mem', 'REQ')
    if len(reqs) != 2:
        return False, f'Expected 2 REQs, got {len(reqs)}'
    addrs = [r for r in reqs if 'addr=0x2000' in r]
    if len(addrs) != 1:
        return False, f'Segment 1 missing: {reqs}'
    addrs = [r for r in reqs if 'addr=0x3000' in r]
    if len(addrs) != 1:
        return False, f'Segment 2 missing: {reqs}'
    return True, 'two PT_LOAD segments delivered'


def _check_entry_addr(test, output, *args, **kwargs):
    # One section chunk + one entry-address write at 0x0 (4 bytes, little
    # endian of 0x4000 = 00 40 00 00).
    reqs = _lines(output, 'mem', 'REQ')
    if len(reqs) != 2:
        return False, f'Expected 2 REQs, got {len(reqs)}: {reqs}'
    entry_wr = [r for r in reqs if 'addr=0x0' in r and 'size=4' in r]
    if len(entry_wr) != 1:
        return False, f'Entry-address write missing at 0x0: {reqs}'
    if 'data=00400000' not in entry_wr[0]:
        return False, f'Entry-address write should carry LE(0x4000): {entry_wr[0]}'
    return True, 'entry_addr write delivered with correct bytes'


def _check_entry_override(test, output, *args, **kwargs):
    # The ENTRY wire must carry 0xdeadbeef, not the ELF header's e_entry.
    entries = _lines(output, 'sink', 'ENTRY')
    if len(entries) != 1:
        return False, f'Expected 1 ENTRY pulse, got {len(entries)}'
    if 'value=0xdeadbeef' not in entries[0]:
        return False, f'Entry override not applied: {entries[0]}'
    return True, 'explicit entry= overrides ELF header'


def _check_deny_retry(test, output, *args, **kwargs):
    # stub_target stays denied; we look for repeated REQ/RETRY events on
    # mem. The loader must NOT bubble DENIED/RETRY to any upstream (there
    # is none) and must keep replaying the same chunk.
    if _count(output, 'mem', 'REQ') < 2:
        return False, f'Expected multiple mem REQs, got {_count(output, "mem", "REQ")}'
    if _count(output, 'mem', 'RETRY') < 1:
        return False, 'Expected at least one RETRY on mem'
    # No finalisation wires should have fired (the section never completes).
    if _count(output, 'sink', 'START') != 0:
        return False, 'START should not fire while blocked on DENY'
    return True, 'loader replays the denied chunk on every mem RETRY'


def _check_async_resp(test, output, *args, **kwargs):
    # Single 32-byte segment, async resp after 10 cycles per chunk. One
    # chunk, one granted+resp pair, then ENTRY+START.
    if _count(output, 'mem', 'REQ') != 1:
        return False, f'Expected 1 REQ, got {_count(output, "mem", "REQ")}'
    if _count(output, 'mem', 'RESP') != 1:
        return False, 'Expected 1 async RESP on mem'
    if _count(output, 'sink', 'START') != 1:
        return False, 'Expected finalisation START'
    return True, 'async resp acknowledged; finalisation fired after'


def _check_invalid_resp(test, output, *args, **kwargs):
    # mem replies DONE+INVALID. Loader must log a warning but still
    # finalise (ENTRY + START fire). The regression this guards against
    # is v1's silent hang on any INVALID.
    if _count(output, 'mem', 'REQ') < 1:
        return False, 'Expected at least one REQ'
    if _count(output, 'sink', 'START') != 1:
        return False, 'Expected START to fire despite INVALID response'
    return True, 'INVALID response does not hang the loader'


def _check_missing_binary(test, output, *args, **kwargs):
    # Non-existent binary: no REQ to mem, no START/ENTRY. (The loader
    # never schedules its event because sections is empty.)
    if _count(output, 'mem', 'REQ') != 0:
        return False, 'No REQ expected for a missing binary'
    if _count(output, 'sink', 'START') != 0:
        return False, 'No START expected for a missing binary'
    if _count(output, 'sink', 'ENTRY') != 0:
        return False, 'No ENTRY expected for a missing binary'
    return True, 'missing binary logged as warning, no traffic emitted'


def testset_build(testset):
    testset.set_name('loader_v2')
    testset.set_components(["utils.loader.loader_v2"])

    t = testset.new_make_test('basic_load', flags='CASE=basic_load',
                              checker=_check_basic_load,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Single-segment ELF with 16 bytes of known data at 0x1000. "
        "Validates the happy-path streaming loop, the resp callback, "
        "and the ENTRY/START finalisation wires."
    )

    t = testset.new_make_test('bss_fill', flags='CASE=bss_fill',
                              checker=_check_bss_fill,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Segment with p_filesz=4 and p_memsz=16. Validates that the "
        "trailing bss bytes are emitted as a separate write carrying a "
        "zero payload (and not merged with the data chunk)."
    )

    t = testset.new_make_test('multi_segment', flags='CASE=multi_segment',
                              checker=_check_multi_segment,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "ELF with two disjoint PT_LOAD segments at 0x2000 and 0x3000. "
        "Validates that multiple segments are queued and drained in "
        "file order."
    )

    t = testset.new_make_test('entry_addr', flags='CASE=entry_addr',
                              checker=_check_entry_addr,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "entry_addr=0x0 writes the ELF entry (0x4000) as a 4-byte word "
        "(little-endian) at address 0x0 in addition to the regular "
        "section copy. Validates the entry_addr feature end-to-end "
        "including byte ordering."
    )

    t = testset.new_make_test('entry_override', flags='CASE=entry_override',
                              checker=_check_entry_override,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "An explicit ``entry=0xdeadbeef`` parameter overrides the ELF "
        "header's e_entry. Validates that the ENTRY wire reports the "
        "override value and not the one parsed from the binary."
    )

    t = testset.new_make_test('deny_retry', flags='CASE=deny_retry',
                              checker=_check_deny_retry,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Downstream target DENYs every write (retry every 5 cycles). "
        "Validates the ``output_retry`` replay path: the loader must "
        "re-send the exact same chunk on every retry without "
        "advancing the section pointer, and must not fire the "
        "finalisation wires until the chunk actually lands."
    )

    t = testset.new_make_test('async_resp', flags='CASE=async_resp',
                              checker=_check_async_resp,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Downstream returns IO_REQ_GRANTED + deferred resp. Validates "
        "that the loader waits for ``resp()`` before issuing the next "
        "chunk and that the finalisation wires fire only after the "
        "last chunk has actually been acknowledged."
    )

    t = testset.new_make_test('invalid_resp', flags='CASE=invalid_resp',
                              checker=_check_invalid_resp,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Downstream returns IO_REQ_DONE + IO_RESP_INVALID on the only "
        "chunk. Guards against v1's silent hang on any INVALID "
        "response: the loader logs a warning but still fires the "
        "finalisation wires."
    )

    t = testset.new_make_test('missing_binary', flags='CASE=missing_binary',
                              checker=_check_missing_binary,
                              build_resource='gvsoc.core.build',
                              no_clean=True)
    t.add_description(
        "Non-existent binary path. The loader must log a warning and "
        "exit gracefully without emitting any traffic — the sections "
        "queue stays empty and the streaming event is never armed."
    )
